                <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="Purchase.delete('${p.id}')">🗑</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td colspan="5">Total (${list.length} records)</td>
            <td>${fmtCur(list.reduce((s,p)=>s+(parseFloat(p.taxableValue)||0),0))}</td>
            <td>${fmtCur(list.reduce((s,p)=>s+(parseFloat(p.cgst)||0)+(parseFloat(p.sgst)||0)+(parseFloat(p.igst)||0),0))}</td>
            <td>${fmtCur(list.reduce((s,p)=>s+(parseFloat(p.totalAmount)||0),0))}</td>
            <td colspan="3"></td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  }

  function _gstr2aBadge(status) {
    const map = {
      'Matched':       'badge-green',
      'Pending':       'badge-yellow',
      'Mismatch':      'badge-red',
      'Not Available': 'badge-orange',
      'Ineligible ITC':'badge-purple'
    };
    const s = status || 'Pending';
    return `<span class="badge ${map[s] || 'badge-gray'}">${s}</span>`;
  }

  function _renderCategoryBreakdown() {
    const wrap = document.getElementById('cat-breakdown');
    if (!wrap) return;

    const cats = {};
    _purchases.forEach(p => {
      const c = p.expenseCategory || 'Other';
      if (!cats[c]) cats[c] = { total: 0, gst: 0, count: 0 };
      cats[c].total += parseFloat(p.totalAmount) || 0;
      cats[c].gst   += (parseFloat(p.cgst)||0) + (parseFloat(p.sgst)||0) + (parseFloat(p.igst)||0);
      cats[c].count++;
    });

    const sorted = Object.entries(cats).sort((a,b) => b[1].total - a[1].total);
    if (!sorted.length) {
      wrap.innerHTML = `<div class="table-empty">No data yet</div>`;
      return;
    }

    const grandTotal = sorted.reduce((s,[,v]) => s + v.total, 0);

    wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Category</th><th>Entries</th><th>Taxable</th><th>GST</th><th>Total</th><th>% of Spend</th></tr>
        </thead>
        <tbody>
          ${sorted.map(([cat, v]) => {
            const pct = grandTotal > 0 ? ((v.total / grandTotal) * 100).toFixed(1) : 0;
            return `<tr>
              <td style="font-weight:600">${esc(cat)}</td>
              <td>${v.count}</td>
              <td>${fmtCur(v.total - v.gst)}</td>
              <td>${fmtCur(v.gst)}</td>
              <td style="font-weight:700">${fmtCur(v.total)}</td>
              <td>
                <div style="display:flex;align-items:center;gap:8px">
                  <div style="flex:1;height:6px;background:var(--border);border-radius:99px;min-width:60px">
                    <div style="width:${pct}%;height:100%;background:var(--navy-400);border-radius:99px"></div>
                  </div>
                  <span style="font-size:11px;color:var(--muted);width:36px">${pct}%</span>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td>Total</td>
            <td>${_purchases.length}</td>
            <td>${fmtCur(sorted.reduce((s,[,v])=>s+v.total-v.gst,0))}</td>
            <td>${fmtCur(sorted.reduce((s,[,v])=>s+v.gst,0))}</td>
            <td>${fmtCur(grandTotal)}</td>
            <td>100%</td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  }

  // ── Filter handlers ──────────────────────────────────────
  function _setCatFilter(v)    { _filter.category = v; _applyFilter(); }
  function _setStatusFilter(v) { _filter.status   = v; _applyFilter(); }
  function _setSearch(q)       { _filter.search   = q; _applyFilter(); }

  // ── Modal ────────────────────────────────────────────────
  function _ensureModal() {
    if (document.getElementById('modal-purchase')) return;

    const div = document.createElement('div');
    div.innerHTML = `
    <div class="modal-overlay" id="modal-purchase">
      <div class="modal">
        <div class="modal-header">
          <h3 id="pur-modal-title">Add Purchase</h3>
          <button class="modal-close" onclick="closeModal('modal-purchase')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">

            <div class="form-section">Vendor Details</div>
            <div class="form-group">
              <label>Vendor / Supplier Name <span class="req">*</span></label>
              <input class="form-control" id="p-vendor" placeholder="Vendor name"/>
            </div>
            <div class="form-group">
              <label>Vendor GSTIN</label>
              <input class="form-control" id="p-gstin" placeholder="27AAAAA0000A1Z5"
                oninput="this.value=this.value.toUpperCase()"
                onblur="Purchase._onGSTINBlur()"/>
              <span class="form-hint">Required for GSTR-2A matching</span>
            </div>
            <div class="form-group">
              <label>Vendor Invoice No.</label>
              <input class="form-control" id="p-invno" placeholder="Vendor's bill number"/>
            </div>
            <div class="form-group">
              <label>Invoice Date <span class="req">*</span></label>
              <input class="form-control" id="p-date" type="date"/>
            </div>

            <div class="form-section">Purchase Details</div>
            <div class="form-group full">
              <label>Description</label>
              <textarea class="form-control" id="p-desc" rows="2"
                placeholder="Description of goods / services purchased"></textarea>
            </div>
            <div class="form-group">
              <label>Expense Category <span class="req">*</span></label>
              <select class="form-control" id="p-cat">
                ${EXPENSE_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Payment Status</label>
              <select class="form-control" id="p-pmtst">
                <option value="Unpaid">Unpaid</option>
                <option value="Paid">Paid</option>
              </select>
            </div>

            <div class="form-section">GST Details</div>
            <div class="form-group">
              <label>Taxable Value (₹) <span class="req">*</span></label>
              <input class="form-control" id="p-taxable" type="number" step="0.01"
                placeholder="0.00" oninput="Purchase._calcPur()"/>
            </div>
            <div class="form-group">
              <label>GST Rate (%)</label>
              <select class="form-control" id="p-grate" onchange="Purchase._calcPur()">
                ${gstRateOptions('18')}
              </select>
            </div>
            <div class="form-group">
              <label>CGST (₹)</label>
              <input class="form-control" id="p-cgst" readonly/>
            </div>
            <div class="form-group">
              <label>SGST (₹)</label>
              <input class="form-control" id="p-sgst" readonly/>
            </div>
            <div class="form-group">
              <label>IGST (₹)</label>
              <input class="form-control" id="p-igst" readonly/>
            </div>
            <div class="form-group">
              <label>Total Amount (₹)</label>
              <input class="form-control" id="p-total" readonly
                style="font-weight:800;font-size:14px"/>
            </div>

            <div class="form-section">Additional</div>
            <div class="form-group full">
              <label>Attachment URL (Drive / Doc link)</label>
              <input class="form-control" id="p-attach"
                placeholder="Paste Google Drive link to scanned bill"/>
            </div>

            <!-- GSTR-2A auto note -->
            <div class="form-group full" id="gstr2a-note" style="display:none">
              <div style="padding:10px 14px;background:#DBEAFE;border-radius:var(--radius-sm);
                font-size:12px;color:var(--navy-600);display:flex;align-items:center;gap:8px">
                <span>🔍</span>
                <span>This purchase has a GSTIN and GST rate — it will automatically appear in
                <strong>GSTR-2A Matching</strong> for reconciliation.</span>
              </div>
            </div>

          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-purchase')">Cancel</button>
          <button class="btn btn-primary" onclick="Purchase.save()">💾 Save Purchase</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div);
  }

  // ── GST Calc ─────────────────────────────────────────────
  function _calcPur() {
    const taxable = parseFloat(document.getElementById('p-taxable')?.value) || 0;
    const rate    = parseFloat(document.getElementById('p-grate')?.value)   || 0;
    const gst     = taxable * rate / 100;
    const set = (id, v) => {
      const el = document.getElementById(id);
      if (el) el.value = v.toFixed(2);
    };
    // Assume intra-state for purchases (CGST + SGST)
    set('p-cgst',  gst / 2);
    set('p-sgst',  gst / 2);
    set('p-igst',  0);
    set('p-total', taxable + gst);

    // Show 2A note if GSTIN entered and rate > 0
    _toggle2ANote();
  }

  function _onGSTINBlur() { _toggle2ANote(); }

  function _toggle2ANote() {
    const gstin  = document.getElementById('p-gstin')?.value || '';
    const rate   = parseFloat(document.getElementById('p-grate')?.value) || 0;
    const note   = document.getElementById('gstr2a-note');
    if (note) note.style.display = (gstin && rate > 0) ? '' : 'none';
  }

  // ── Open New / Edit ──────────────────────────────────────
  function openNew() {
    _editId = null;
    _resetModal();
    document.getElementById('pur-modal-title').textContent = 'Add Purchase';
    document.getElementById('p-date').value = today();
    openModal('modal-purchase');
  }

  function openEdit(id) {
    _editId = id;
    const p = _purchases.find(x => x.id === id);
    if (!p) return;

    _resetModal();
    document.getElementById('pur-modal-title').textContent = 'Edit Purchase';
    document.getElementById('p-vendor').value  = p.vendorName      || '';
    document.getElementById('p-gstin').value   = p.vendorGSTIN     || '';
    document.getElementById('p-invno').value   = p.vendorInvoiceNo || '';
    document.getElementById('p-date').value    = p.purchaseDate    || '';
    document.getElementById('p-desc').value    = p.description     || '';
    document.getElementById('p-cat').value     = p.expenseCategory || 'Other';
    document.getElementById('p-pmtst').value   = p.paymentStatus   || 'Unpaid';
    document.getElementById('p-taxable').value = p.taxableValue    || '';
    document.getElementById('p-grate').value   = p.gstRate         || '18';
    document.getElementById('p-attach').value  = p.attachmentUrl   || '';
    _calcPur();
    openModal('modal-purchase');
  }

  function _resetModal() {
    ['p-vendor','p-gstin','p-invno','p-date','p-desc','p-taxable',
     'p-cgst','p-sgst','p-igst','p-total','p-attach'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('p-grate').value  = '18';
    document.getElementById('p-pmtst').value  = 'Unpaid';
    document.getElementById('p-cat').value    = EXPENSE_CATEGORIES[0];
    const note = document.getElementById('gstr2a-note');
    if (note) note.style.display = 'none';
  }

  // ── Save ─────────────────────────────────────────────────
  async function save() {
    const vendor  = document.getElementById('p-vendor').value.trim();
    const date    = document.getElementById('p-date').value;
    const taxable = document.getElementById('p-taxable').value;

    if (!vendor)  { toast('Vendor name is required', 'warning');  return; }
    if (!date)    { toast('Invoice date is required', 'warning');  return; }
    if (!taxable) { toast('Taxable value is required', 'warning'); return; }

    const btn = document.querySelector('#modal-purchase .btn-primary');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    try {
      await API.savePurchase({
        id:              _editId || null,
        vendorName:      vendor,
        vendorGSTIN:     document.getElementById('p-gstin').value.toUpperCase(),
        vendorInvoiceNo: document.getElementById('p-invno').value,
        purchaseDate:    date,
        description:     document.getElementById('p-desc').value,
        expenseCategory: document.getElementById('p-cat').value,
        paymentStatus:   document.getElementById('p-pmtst').value,
        taxableValue:    taxable,
        gstRate:         document.getElementById('p-grate').value,
        attachmentUrl:   document.getElementById('p-attach').value
      });

      toast('✅ Purchase saved — auto-added to GSTR-2A Matching', 'success');
      closeModal('modal-purchase');
      render();
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = '💾 Save Purchase';
    }
  }

  // ── Delete ───────────────────────────────────────────────
  async function del(id) {
    const p  = _purchases.find(x => x.id === id);
    const ok = await confirm(
      `Delete purchase from "${p?.vendorName || 'this vendor'}"? This will also remove it from GSTR-2A matching.`,
      'Delete Purchase'
    );
    if (!ok) return;
    try {
      await API.deletePurchase(id);
      toast('🗑 Purchase deleted', 'success');
      render();
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  }

  // ── Excel Export ─────────────────────────────────────────
  function exportExcelData() {
    if (!_purchases.length) { toast('No purchases to export', 'warning'); return; }
    const rows = [[
      'Date','Vendor Name','Vendor GSTIN','Vendor Invoice No','Category',
      'Description','Taxable Value','GST Rate%','CGST','SGST','IGST',
      'Total Amount','Payment Status','GSTR-2A Status'
    ]];
    [..._purchases]
      .sort((a,b) => new Date(a.purchaseDate) - new Date(b.purchaseDate))
      .forEach(p => rows.push([
        p.purchaseDate, p.vendorName, p.vendorGSTIN || '', p.vendorInvoiceNo || '',
        p.expenseCategory || '', p.description || '',
        p.taxableValue, (p.gstRate || '0') + '%',
        p.cgst || 0, p.sgst || 0, p.igst || 0,
        p.totalAmount, p.paymentStatus || '',
        p.gstr2aStatus || 'Pending'
      ]));
    exportExcel(rows, 'Purchases', `PurchaseRegister_${getCurrentFY()}.xlsx`);
  }

  // ── Public ───────────────────────────────────────────────
  return {
    render,
    openNew,
    openEdit,
    save,
    delete:         del,
    exportExcelData,
    _setCatFilter,
    _setStatusFilter,
    _setSearch,
    _calcPur,
    _onGSTINBlur
  };

})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — outstanding.js
   ============================================================ */

'use strict';

const Outstanding = (() => {

  let _records  = [];
  let _filter   = { status: 'all', search: '' };

  async function render() {
    _records = await API.getOutstanding();
    _renderShell();
    _applyFilter();
    _ensureModal();
  }

  function _renderShell() {
    const el     = document.getElementById('content');
    const unpaid = _records.filter(r => r.status !== 'Paid');
    const total  = unpaid.reduce((s,r) => s + (parseFloat(r.balance)||0), 0);
    const over30 = unpaid.filter(r => (parseInt(r.daysOutstanding)||0) > 30).reduce((s,r)=>s+(parseFloat(r.balance)||0),0);
    const over60 = unpaid.filter(r => (parseInt(r.daysOutstanding)||0) > 60).reduce((s,r)=>s+(parseFloat(r.balance)||0),0);
    const over90 = unpaid.filter(r => (parseInt(r.daysOutstanding)||0) > 90).reduce((s,r)=>s+(parseFloat(r.balance)||0),0);

    el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--red)">
        <div class="s-icon">💰</div>
        <div class="s-label">Total Receivable</div>
        <div class="s-value" style="color:var(--red)">${fmtCur(total)}</div>
        <div class="s-sub">${unpaid.length} invoice${unpaid.length!==1?'s':''}</div>
      </div>
      <div class="stat-card" style="--c:var(--yellow)">
        <div class="s-icon">⏱️</div>
        <div class="s-label">31–60 Days</div>
        <div class="s-value" style="color:var(--yellow)">${fmtCur(over30 - over60)}</div>
        <div class="s-sub">${unpaid.filter(r=>(parseInt(r.daysOutstanding)||0)>30&&(parseInt(r.daysOutstanding)||0)<=60).length} invoices</div>
      </div>
      <div class="stat-card" style="--c:var(--orange)">
        <div class="s-icon">⚠️</div>
        <div class="s-label">61–90 Days</div>
        <div class="s-value" style="color:var(--orange)">${fmtCur(over60 - over90)}</div>
        <div class="s-sub">${unpaid.filter(r=>(parseInt(r.daysOutstanding)||0)>60&&(parseInt(r.daysOutstanding)||0)<=90).length} invoices</div>
      </div>
      <div class="stat-card" style="--c:var(--red)">
        <div class="s-icon">🚨</div>
        <div class="s-label">90+ Days</div>
        <div class="s-value" style="color:var(--red)">${fmtCur(over90)}</div>
        <div class="s-sub">${unpaid.filter(r=>(parseInt(r.daysOutstanding)||0)>90).length} invoices</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Outstanding Receivables</h2>
        <div class="card-actions">
          <select class="form-control" style="width:auto;padding:6px 10px" onchange="Outstanding._setStatus(this.value)">
            <option value="all">All</option>
            <option value="Unpaid">Unpaid</option>
            <option value="Partial">Partial</option>
            <option value="Paid">Paid</option>
          </select>
          <input class="form-control" style="width:180px;padding:6px 10px" type="text"
            placeholder="Search client…" oninput="Outstanding._setSearch(this.value)"/>
          <button class="btn btn-outline np" onclick="Outstanding.exportData()">⬇️ Export</button>
        </div>
      </div>
      <div id="out-table-wrap"></div>
    </div>`;
  }

  function _applyFilter() {
    let list = [..._records];
    if (_filter.status !== 'all') list = list.filter(r => r.status === _filter.status);
    if (_filter.search) {
      const q = _filter.search.toLowerCase();
      list = list.filter(r =>
        (r.clientName || '').toLowerCase().includes(q) ||
        (r.invoiceNo  || '').toLowerCase().includes(q)
      );
    }
    list.sort((a,b) => (parseFloat(b.balance)||0) - (parseFloat(a.balance)||0));
    _renderTable(list);
  }

  function _renderTable(list) {
    const wrap = document.getElementById('out-table-wrap');
    if (!wrap) return;
    if (!list.length) {
      wrap.innerHTML = `<div class="empty-state"><span class="es-icon">✅</span>
        <h3>All Clear!</h3><p>No outstanding receivables.</p></div>`;
      return;
    }
    wrap.innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Invoice No.</th><th>Client</th><th>Invoice Date</th>
        <th>Amount</th><th>Received</th><th>Balance</th>
        <th>Days</th><th>Status</th><th class="np">Actions</th>
      </tr></thead>
      <tbody>
        ${list.map(r => {
          const days = parseInt(r.daysOutstanding) || 0;
          return `<tr>
            <td style="font-weight:700;font-size:12px;font-family:monospace">${esc(r.invoiceNo)}</td>
            <td style="font-weight:600">${trunc(r.clientName,24)}</td>
            <td>${fmtDate(r.invoiceDate)}</td>
            <td>${fmtCur(r.totalAmount)}</td>
            <td style="color:var(--green);font-weight:600">${fmtCur(r.received)}</td>
            <td style="font-weight:800;color:${parseFloat(r.balance)>0?'var(--red)':'var(--green)'}">${fmtCur(r.balance)}</td>
            <td>${ageBadge(days)}</td>
            <td>${badge(r.status)}</td>
            <td class="np" style="white-space:nowrap">
              ${r.status !== 'Paid'
                ? `<button class="btn btn-success btn-sm" onclick="Outstanding.openPayment('${r.id}','${r.invoiceId}','${esc(r.invoiceNo)}',${parseFloat(r.balance)||0})">💰 Pay</button>`
                : `<span style="color:var(--muted);font-size:11px">Paid ✓</span>`
              }
            </td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot><tr>
        <td colspan="3">Total</td>
        <td>${fmtCur(list.reduce((s,r)=>s+(parseFloat(r.totalAmount)||0),0))}</td>
        <td>${fmtCur(list.reduce((s,r)=>s+(parseFloat(r.received)||0),0))}</td>
        <td>${fmtCur(list.reduce((s,r)=>s+(parseFloat(r.balance)||0),0))}</td>
        <td colspan="3"></td>
      </tr></tfoot>
    </table></div>`;
  }

  function _ensureModal() {
    if (document.getElementById('modal-out-payment')) return;
    const div = document.createElement('div');
    div.innerHTML = `
    <div class="modal-overlay" id="modal-out-payment">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3>Record Payment</h3>
          <button class="modal-close" onclick="closeModal('modal-out-payment')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full"><label>Invoice</label><input class="form-control" id="op-invno" readonly/></div>
            <div class="form-group full"><label>Outstanding Balance</label><input class="form-control" id="op-balance" readonly style="font-weight:700;color:var(--red)"/></div>
            <div class="form-group full"><label>Amount Received (₹) <span class="req">*</span></label><input class="form-control" id="op-amount" type="number" step="0.01" min="0" placeholder="0.00"/></div>
            <div class="form-group full"><label>Payment Date</label><input class="form-control" id="op-date" type="date"/></div>
            <div class="form-group full"><label>Remarks</label><input class="form-control" id="op-remarks" placeholder="NEFT / Cheque / UPI ref no."/></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-out-payment')">Cancel</button>
          <button class="btn btn-success" onclick="Outstanding.savePayment()">💰 Record</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div);
  }

  let _payInvId = null;

  function openPayment(recId, invoiceId, invoiceNo, balance) {
    _payInvId = invoiceId;
    document.getElementById('op-invno').value   = invoiceNo;
    document.getElementById('op-balance').value = fmtCur(balance);
    document.getElementById('op-amount').value  = '';
    document.getElementById('op-date').value    = today();
    document.getElementById('op-remarks').value = '';
    openModal('modal-out-payment');
  }

  async function savePayment() {
    const amt = parseFloat(document.getElementById('op-amount').value);
    if (!amt || amt <= 0) { toast('Enter a valid amount', 'warning'); return; }
    const btn = document.querySelector('#modal-out-payment .btn-success');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await API.recordPayment({ invoiceId: _payInvId, amount: amt });
      toast('✅ Payment recorded', 'success');
      closeModal('modal-out-payment');
      render();
    } catch (e) { toast('Error: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = '💰 Record'; }
  }

  function exportData() {
    if (!_records.length) { toast('No data to export', 'warning'); return; }
    const rows = [['Invoice No','Client','Invoice Date','Total Amount','Received','Balance','Days Outstanding','Status']];
    _records.forEach(r => rows.push([r.invoiceNo,r.clientName,r.invoiceDate,r.totalAmount,r.received,r.balance,r.daysOutstanding,r.status]));
    exportExcel(rows, 'Outstanding', `Outstanding_${getCurrentFY()}.xlsx`);
  }

  function _setStatus(v) { _filter.status = v; _applyFilter(); }
  function _setSearch(q) { _filter.search = q; _applyFilter(); }

  return { render, openPayment, savePayment, exportData, _setStatus, _setSearch };
})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — gstr2a.js
   ============================================================ */

'use strict';

const Gstr2a = (() => {

  let _records = [];
  let _filter  = { status: 'all', search: '' };

  const STATUS_OPTIONS = [
    { value: 'Pending',        label: 'Pending',         icon: '⏳', badge: 'badge-yellow'  },
    { value: 'Matched',        label: 'Matched',         icon: '✅', badge: 'badge-green'   },
    { value: 'Mismatch',       label: 'Mismatch',        icon: '❌', badge: 'badge-red'     },
    { value: 'Not Available',  label: 'Not Available',   icon: '🚫', badge: 'badge-orange'  },
    { value: 'Ineligible ITC', label: 'Ineligible ITC',  icon: '🔒', badge: 'badge-purple'  },
  ];

  async function render() {
    _records = await API.getGSTR2A();
    _renderShell();
    _applyFilter();
  }

  function _renderShell() {
    const el      = document.getElementById('content');
    const matched = _records.filter(r => r.status === 'Matched');
    const pending = _records.filter(r => r.status === 'Pending' || !r.status);
    const mismat  = _records.filter(r => r.status === 'Mismatch');
    const inelig  = _records.filter(r => r.status === 'Ineligible ITC');
    const itcAvail= matched.reduce((s,r) => s + (parseFloat(r.gstAmount)||0), 0);
    const itcPend = pending.reduce((s,r) => s + (parseFloat(r.gstAmount)||0), 0);

    el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--navy-400)">
        <div class="s-icon">🔍</div>
        <div class="s-label">Total Records</div>
        <div class="s-value">${_records.length}</div>
        <div class="s-sub">Auto-added from purchases</div>
      </div>
      <div class="stat-card" style="--c:var(--green)">
        <div class="s-icon">✅</div>
        <div class="s-label">Matched — ITC Available</div>
        <div class="s-value" style="color:var(--green)">${fmtCur(itcAvail)}</div>
        <div class="s-sub">${matched.length} invoices</div>
      </div>
      <div class="stat-card" style="--c:var(--yellow)">
        <div class="s-icon">⏳</div>
        <div class="s-label">Pending Verification</div>
        <div class="s-value" style="color:var(--yellow)">${fmtCur(itcPend)}</div>
        <div class="s-sub">${pending.length} invoices</div>
      </div>
      <div class="stat-card" style="--c:var(--red)">
        <div class="s-icon">⚠️</div>
        <div class="s-label">Mismatch / Ineligible</div>
        <div class="s-value" style="color:var(--red)">${mismat.length + inelig.length}</div>
        <div class="s-sub">${fmtCur((mismat.concat(inelig)).reduce((s,r)=>s+(parseFloat(r.gstAmount)||0),0))}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>GSTR-2A Matching</h2>
        <div class="card-actions">
          <div class="pill-group">
            ${['all','Pending','Matched','Mismatch','Not Available','Ineligible ITC'].map((s,i) =>
              `<button class="pill-btn ${i===0?'active':''}" id="g2a-pill-${s.replace(/\s/g,'_')}"
                onclick="Gstr2a._setFilter('${s}')">${i===0?'All':s}</button>`
            ).join('')}
          </div>
          <input class="form-control" style="width:180px;padding:6px 10px" type="text"
            placeholder="Search vendor…" oninput="Gstr2a._setSearch(this.value)"/>
          <button class="btn btn-outline np" onclick="Gstr2a.exportData()">⬇️ Export</button>
        </div>
      </div>
      <div style="padding:8px 0 12px;font-size:12px;color:var(--muted)">
        💡 Every GST purchase with a GSTIN is auto-added here. Use <strong>Change Status</strong> to mark each invoice after checking on the GST portal.
      </div>
      <div id="g2a-table-wrap"></div>
    </div>

    <!-- ITC Summary -->
    <div class="card">
      <div class="card-header"><h2>ITC Summary</h2></div>
      <div class="gst3b-grid">
        <div class="gst3b-box">
          <h3>✅ Eligible ITC (Matched)</h3>
          ${_itcBox(matched)}
        </div>
        <div class="gst3b-box">
          <h3>⏳ Pending ITC</h3>
          ${_itcBox(pending)}
        </div>
      </div>
    </div>`;
  }

  function _itcBox(rows) {
    const cgst = rows.reduce((s,r)=>s+(parseFloat(r.cgst)||0),0);
    const sgst = rows.reduce((s,r)=>s+(parseFloat(r.sgst)||0),0);
    const igst = rows.reduce((s,r)=>s+(parseFloat(r.igst)||0),0);
    return `
      <div class="gst3b-row"><span>CGST</span><span>${fmtCur(cgst)}</span></div>
      <div class="gst3b-row"><span>SGST</span><span>${fmtCur(sgst)}</span></div>
      <div class="gst3b-row"><span>IGST</span><span>${fmtCur(igst)}</span></div>
      <div class="gst3b-row"><span>Total ITC</span><span>${fmtCur(cgst+sgst+igst)}</span></div>`;
  }

  function _applyFilter() {
    let list = [..._records];
    if (_filter.status !== 'all') list = list.filter(r => (r.status||'Pending') === _filter.status);
    if (_filter.search) {
      const q = _filter.search.toLowerCase();
      list = list.filter(r =>
        (r.vendorName  || '').toLowerCase().includes(q) ||
        (r.vendorGSTIN || '').toLowerCase().includes(q) ||
        (r.invoiceNo   || '').toLowerCase().includes(q)
      );
    }
    list.sort((a,b) => new Date(b.invoiceDate) - new Date(a.invoiceDate));
    _renderTable(list);

    // Sync pills
    ['all','Pending','Matched','Mismatch','Not Available','Ineligible ITC'].forEach(s => {
      const el = document.getElementById('g2a-pill-' + s.replace(/\s/g,'_'));
      if (el) el.classList.toggle('active', _filter.status === s);
    });
  }

  function _renderTable(list) {
    const wrap = document.getElementById('g2a-table-wrap');
    if (!wrap) return;
    if (!list.length) {
      wrap.innerHTML = `<div class="empty-state">
        <span class="es-icon">🔍</span>
        <h3>No records</h3>
        <p>Add purchases with a GSTIN to populate this list automatically.</p>
      </div>`;
      return;
    }
    wrap.innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Vendor Name</th><th>GSTIN</th><th>Inv No.</th><th>Inv Date</th>
        <th>Taxable</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total GST</th>
        <th>Status</th><th>Updated By</th><th>Updated On</th><th class="np">Action</th>
      </tr></thead>
      <tbody>
        ${list.map(r => {
          const st  = r.status || 'Pending';
          const opt = STATUS_OPTIONS.find(o => o.value === st) || STATUS_OPTIONS[0];
          return `<tr style="background:${st==='Matched'?'#F0FDF4':st==='Mismatch'||st==='Ineligible ITC'?'#FFF7ED':''}">
            <td style="font-weight:600">${trunc(r.vendorName,22)}</td>
            <td style="font-family:monospace;font-size:11px">${r.vendorGSTIN||'—'}</td>
            <td style="font-size:11.5px">${esc(r.invoiceNo||'—')}</td>
            <td style="white-space:nowrap">${fmtDate(r.invoiceDate)}</td>
            <td>${fmtCur(r.taxableValue)}</td>
            <td>${fmtCur(r.cgst)}</td>
            <td>${fmtCur(r.sgst)}</td>
            <td>${fmtCur(r.igst)}</td>
            <td style="font-weight:700">${fmtCur(r.gstAmount)}</td>
            <td><span class="badge ${opt.badge}">${opt.icon} ${st}</span></td>
            <td style="font-size:11px;color:var(--muted)">${r.updatedBy||'—'}</td>
            <td style="font-size:11px;color:var(--muted)">${r.updatedOn?fmtDate(r.updatedOn):'—'}</td>
            <td class="np">
              <button class="btn btn-outline btn-sm"
                onclick="Gstr2a._openStatusMenu(this,'${r.id}','${st}')">
                Change Status ▾
              </button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
  }

  function _openStatusMenu(btn, id, current) {
    showStatusPopup(btn,
      STATUS_OPTIONS.map(o => ({ ...o, label: (o.value === current ? '✓ ' : '    ') + o.label })),
      async (value) => {
        if (value === current) return;
        try {
          await API.updateGSTR2A({ id, status: value });
          toast(`✅ Status updated to "${value}"`, 'success');
          render();
        } catch (e) { toast('Error: ' + e.message, 'error'); }
      }
    );
  }

  function _setFilter(s) { _filter.status = s; _applyFilter(); }
  function _setSearch(q) { _filter.search = q; _applyFilter(); }

  function exportData() {
    if (!_records.length) { toast('No data to export', 'warning'); return; }
    const rows = [['Vendor Name','Vendor GSTIN','Invoice No','Invoice Date','Taxable Value','CGST','SGST','IGST','Total GST','Status','Updated By','Updated On']];
    _records.forEach(r => rows.push([r.vendorName,r.vendorGSTIN||'',r.invoiceNo||'',r.invoiceDate,r.taxableValue,r.cgst||0,r.sgst||0,r.igst||0,r.gstAmount||0,r.status||'Pending',r.updatedBy||'',r.updatedOn||'']));
    exportExcel(rows, 'GSTR2A', `GSTR2A_Matching_${getCurrentFY()}.xlsx`);
  }

  return { render, exportData, _setFilter, _setSearch, _openStatusMenu };
})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — gstr3b.js
   ============================================================ */

'use strict';

const Gstr3b = (() => {

  let _invoices  = [];
  let _purchases = [];
  let _gstr2a    = [];
  let _selMonth  = new Date().getMonth();
  let _selYear   = new Date().getFullYear();

  async function render() {
    [_invoices, _purchases, _gstr2a] = await Promise.all([
      API.getInvoices(), API.getPurchases(), API.getGSTR2A()
    ]);
    _renderShell();
    _renderEstimate();
  }

  function _renderShell() {
    const el    = document.getElementById('content');
    const now   = new Date();
    const months= ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const years = [now.getFullYear()-1, now.getFullYear(), now.getFullYear()+1];

    el.innerHTML = `
    <!-- Period selector -->
    <div class="card" style="padding:14px 20px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-weight:700;color:var(--navy-600)">Period:</span>
        <select class="form-control" style="width:auto;padding:6px 12px" id="g3b-month"
          onchange="Gstr3b._onPeriodChange()">
          ${months.map((m,i)=>`<option value="${i}"${i===_selMonth?' selected':''}>${m}</option>`).join('')}
        </select>
        <select class="form-control" style="width:auto;padding:6px 12px" id="g3b-year"
          onchange="Gstr3b._onPeriodChange()">
          ${years.map(y=>`<option value="${y}"${y===_selYear?' selected':''}>${y}</option>`).join('')}
        </select>
        <span style="font-size:12px;color:var(--muted)">
          ITC = only <strong>Matched</strong> purchases (from GSTR-2A)
        </span>
        <button class="btn btn-outline btn-sm np" onclick="navigateTo('gstr2a')">Update 2A Status →</button>
      </div>
    </div>

    <!-- Estimate panels -->
    <div id="g3b-content"></div>`;

    _renderEstimate();
  }

  function _renderEstimate() {
    const m = _selMonth;
    const y = _selYear;

    // Outward — Tax Invoices only in this period
    const outInvs = _invoices.filter(i => {
      if ((i.docType || 'Invoice') !== 'Invoice') return false;
      const d = new Date(i.invoiceDate);
      return d.getMonth() === m && d.getFullYear() === y;
    });

    // Eligible ITC — Matched purchases in this period
    const eligIds  = _gstr2a.filter(g => g.status === 'Matched').map(g => g.purchaseId);
    const eligPurs = _purchases.filter(p => {
      if (!eligIds.includes(p.id)) return false;
      const d = new Date(p.purchaseDate);
      return d.getMonth() === m && d.getFullYear() === y;
    });

    // Pending ITC — Pending 2A purchases in this period
    const pendIds  = _gstr2a.filter(g => !g.status || g.status === 'Pending').map(g => g.purchaseId);
    const pendPurs = _purchases.filter(p => {
      if (!pendIds.includes(p.id)) return false;
      const d = new Date(p.purchaseDate);
      return d.getMonth() === m && d.getFullYear() === y;
    });

    // Ineligible
    const ineligIds  = _gstr2a.filter(g => g.status === 'Ineligible ITC').map(g => g.purchaseId);
    const ineligPurs = _purchases.filter(p => {
      if (!ineligIds.includes(p.id)) return false;
      const d = new Date(p.purchaseDate);
      return d.getMonth() === m && d.getFullYear() === y;
    });

    // Compute output tax
    const outTx  = outInvs.reduce((s,i)=>s+(parseFloat(i.taxableValue)||0),0);
    const outCGST= outInvs.reduce((s,i)=>s+(parseFloat(i.cgst)||0),0);
    const outSGST= outInvs.reduce((s,i)=>s+(parseFloat(i.sgst)||0),0);
    const outIGST= outInvs.reduce((s,i)=>s+(parseFloat(i.igst)||0),0);
    const outGST = outCGST + outSGST + outIGST;

    // Eligible ITC
    const itcCGST= eligPurs.reduce((s,p)=>s+(parseFloat(p.cgst)||0),0);
    const itcSGST= eligPurs.reduce((s,p)=>s+(parseFloat(p.sgst)||0),0);
    const itcIGST= eligPurs.reduce((s,p)=>s+(parseFloat(p.igst)||0),0);
    const itcTot = itcCGST + itcSGST + itcIGST;

    // Pending ITC
    const pndCGST= pendPurs.reduce((s,p)=>s+(parseFloat(p.cgst)||0),0);
    const pndSGST= pendPurs.reduce((s,p)=>s+(parseFloat(p.sgst)||0),0);
    const pndIGST= pendPurs.reduce((s,p)=>s+(parseFloat(p.igst)||0),0);
    const pndTot = pndCGST + pndSGST + pndIGST;

    // Ineligible
    const inlTot = ineligPurs.reduce((s,p)=>s+(parseFloat(p.cgst)||0)+(parseFloat(p.sgst)||0)+(parseFloat(p.igst)||0),0);

    // Net liability
    const netCGST= Math.max(0, outCGST - itcCGST);
    const netSGST= Math.max(0, outSGST - itcSGST);
    const netIGST= Math.max(0, outIGST - itcIGST);
    const netTot = netCGST + netSGST + netIGST;

    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const wrap = document.getElementById('g3b-content');
    if (!wrap) return;

    wrap.innerHTML = `
    <div class="gst3b-grid">
      <!-- Output Tax -->
      <div class="gst3b-box">
        <h3>📤 Output Tax (Sales)</h3>
        <div class="gst3b-row"><span>Taxable Value</span><span>${fmtCur(outTx)}</span></div>
        <div class="gst3b-row"><span>CGST Collected</span><span>${fmtCur(outCGST)}</span></div>
        <div class="gst3b-row"><span>SGST Collected</span><span>${fmtCur(outSGST)}</span></div>
        <div class="gst3b-row"><span>IGST Collected</span><span>${fmtCur(outIGST)}</span></div>
        <div class="gst3b-row"><span>Total Output GST</span><span style="color:var(--navy-600)">${fmtCur(outGST)}</span></div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">${outInvs.length} Tax Invoice${outInvs.length!==1?'s':''} in ${months[m]} ${y}</div>
      </div>
      <!-- ITC -->
      <div class="gst3b-box">
        <h3>📥 Input Tax Credit</h3>
        <div class="gst3b-row" style="font-weight:700;color:var(--green)">
          <span>✅ Eligible ITC (2A Matched)</span><span>${fmtCur(itcTot)}</span>
        </div>
        <div class="gst3b-row" style="padding-left:12px"><span>CGST</span><span>${fmtCur(itcCGST)}</span></div>
        <div class="gst3b-row" style="padding-left:12px"><span>SGST</span><span>${fmtCur(itcSGST)}</span></div>
        <div class="gst3b-row" style="padding-left:12px;border-bottom:1px solid var(--border);padding-bottom:8px"><span>IGST</span><span>${fmtCur(itcIGST)}</span></div>
        <div class="gst3b-row" style="color:var(--yellow);margin-top:8px">
          <span>⏳ Pending Verification</span><span>${fmtCur(pndTot)}</span>
        </div>
        <div class="gst3b-row" style="color:var(--red)">
          <span>🔒 Ineligible ITC</span><span>${fmtCur(inlTot)}</span>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">${eligPurs.length} matched purchase${eligPurs.length!==1?'s':''} in ${months[m]} ${y}</div>
      </div>
    </div>

    <!-- Net Liability -->
    <div class="gst3b-net-grid">
      <div class="gst3b-net-box">
        <div class="nl">Output GST</div>
        <div class="nv" style="color:var(--navy-600)">${fmtCur(outGST)}</div>
      </div>
      <div class="gst3b-net-box">
        <div class="nl">Less: Eligible ITC</div>
        <div class="nv" style="color:var(--green)">${fmtCur(itcTot)}</div>
      </div>
      <div class="gst3b-net-box" style="border-left:2px solid var(--border)">
        <div class="nl">Net CGST Payable</div>
        <div class="nv" style="color:${netCGST>0?'var(--red)':'var(--green)'}">${fmtCur(netCGST)}</div>
      </div>
      <div class="gst3b-net-box">
        <div class="nl">Net SGST Payable</div>
        <div class="nv" style="color:${netSGST>0?'var(--red)':'var(--green)'}">${fmtCur(netSGST)}</div>
      </div>
      <div class="gst3b-net-box">
        <div class="nl">Net IGST Payable</div>
        <div class="nv" style="color:${netIGST>0?'var(--red)':'var(--green)'}">${fmtCur(netIGST)}</div>
      </div>
      <div class="gst3b-net-box" style="border-left:2px solid var(--border)">
        <div class="nl">Total GST Payable</div>
        <div class="nv" style="font-size:26px;color:${netTot>0?'var(--red)':'var(--green)'}">${fmtCur(netTot)}</div>
      </div>
    </div>

    ${pndTot > 0 ? `
    <div style="margin-top:12px;padding:11px 14px;background:var(--yellow-bg);border-radius:var(--radius-sm);font-size:12.5px;color:#92400E">
      ⏳ <strong>${fmtCur(pndTot)}</strong> ITC pending 2A verification.
      <span onclick="navigateTo('gstr2a')" style="text-decoration:underline;cursor:pointer;margin-left:6px">Update GSTR-2A status →</span>
    </div>` : ''}

    ${netTot === 0 && outGST > 0 ? `
    <div style="margin-top:12px;padding:11px 14px;background:var(--green-bg);border-radius:var(--radius-sm);font-size:12.5px;color:#15803D;font-weight:600">
      ✅ ITC fully covers GST liability for ${months[m]} ${y}
    </div>` : ''}

    <!-- Invoice breakup -->
    <div class="card" style="margin-top:16px">
      <div class="card-header"><h2>Invoice-wise Breakup — ${months[m]} ${y}</h2></div>
      ${outInvs.length === 0
        ? `<div class="table-empty">No Tax Invoices for this period</div>`
        : `<div class="table-wrap"><table>
            <thead><tr><th>Invoice No</th><th>Client</th><th>Date</th><th>Taxable</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total GST</th><th>Type</th></tr></thead>
            <tbody>
              ${outInvs.map(i=>`<tr>
                <td style="font-weight:700;font-family:monospace;font-size:12px">${esc(i.invoiceNo)}</td>
                <td>${trunc(i.clientName,20)}</td>
                <td>${fmtDate(i.invoiceDate)}</td>
                <td>${fmtCur(i.taxableValue)}</td>
                <td>${fmtCur(i.cgst)}</td>
                <td>${fmtCur(i.sgst)}</td>
                <td>${fmtCur(i.igst)}</td>
                <td style="font-weight:700">${fmtCur((parseFloat(i.cgst)||0)+(parseFloat(i.sgst)||0)+(parseFloat(i.igst)||0))}</td>
                <td>${badge(i.supplyType||'—')}</td>
              </tr>`).join('')}
            </tbody>
            <tfoot><tr>
              <td colspan="3">Total</td>
              <td>${fmtCur(outTx)}</td>
              <td>${fmtCur(outCGST)}</td>
              <td>${fmtCur(outSGST)}</td>
              <td>${fmtCur(outIGST)}</td>
              <td>${fmtCur(outGST)}</td>
              <td></td>
            </tr></tfoot>
          </table></div>`
      }
    </div>`;
  }

  function _onPeriodChange() {
    _selMonth = parseInt(document.getElementById('g3b-month').value);
    _selYear  = parseInt(document.getElementById('g3b-year').value);
    _renderEstimate();
  }

  return { render, _onPeriodChange };
})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — duedates.js
   ============================================================ */

'use strict';

const DueDates = (() => {

  let _records = [];
  let _filter  = { category: 'all', status: 'all', search: '' };

  const CATEGORIES = ['GST','TDS','PF','ESIC','Income Tax','ROC','Other'];
  const COMPLIANCES = {
    GST:        ['GSTR-1','GSTR-3B','GSTR-9 (Annual Return)','GSTR-9C'],
    TDS:        ['TDS Payment','TDS Return (24Q)','TDS Return (26Q)'],
    PF:         ['PF Payment','PF Annual Return (ECR)'],
    ESIC:       ['ESIC Payment','ESIC Half-Yearly Return'],
    'Income Tax':['Advance Tax (15%)','Advance Tax (45%)','Advance Tax (75%)','Advance Tax (100%)','Income Tax Return','Tax Audit (Form 3CD)'],
    ROC:        ['ROC — AOC-4','ROC — MGT-7A'],
    Other:      ['Other']
  };

  async function render() {
    _records = await API.getDueDates();
    _renderShell();
    _applyFilter();
    _ensureModal();
  }

  function _renderShell() {
    const el      = document.getElementById('content');
    const today0  = new Date(); today0.setHours(0,0,0,0);
    const pending = _records.filter(r => r.status !== 'Done' && r.status !== 'Completed');
    const overdue = pending.filter(r => daysUntil(r.dueDate) < 0);
    const due7    = pending.filter(r => { const d=daysUntil(r.dueDate); return d>=0&&d<=7; });
    const due30   = pending.filter(r => { const d=daysUntil(r.dueDate); return d>7&&d<=30; });

    el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--red)">
        <div class="s-icon">🚨</div>
        <div class="s-label">Overdue</div>
        <div class="s-value" style="color:var(--red)">${overdue.length}</div>
        <div class="s-sub">Past due date</div>
      </div>
      <div class="stat-card" style="--c:var(--yellow)">
        <div class="s-icon">⚠️</div>
        <div class="s-label">Due in 7 Days</div>
        <div class="s-value" style="color:var(--yellow)">${due7.length}</div>
        <div class="s-sub">Immediate action needed</div>
      </div>
      <div class="stat-card" style="--c:var(--orange)">
        <div class="s-icon">📅</div>
        <div class="s-label">Due in 30 Days</div>
        <div class="s-value">${due30.length}</div>
        <div class="s-sub">Plan ahead</div>
      </div>
      <div class="stat-card" style="--c:var(--green)">
        <div class="s-icon">✅</div>
        <div class="s-label">Completed</div>
        <div class="s-value" style="color:var(--green)">${_records.filter(r=>r.status==='Done'||r.status==='Completed').length}</div>
        <div class="s-sub">of ${_records.length} total</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Compliance Calendar</h2>
        <div class="card-actions">
          <div class="pill-group">
            ${['all',...CATEGORIES].map((c,i)=>
              `<button class="pill-btn ${i===0?'active':''}" id="dd-cat-${c.replace(/\s/g,'_')}"
                onclick="DueDates._setCat('${c}')">${i===0?'All':c}</button>`
            ).join('')}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <div class="pill-group">
          ${['all','Pending','Done'].map((s,i)=>
            `<button class="pill-btn ${i===0?'active':''}" id="dd-st-${s}"
              onclick="DueDates._setSt('${s}')">${i===0?'All Status':s}</button>`
          ).join('')}
        </div>
        <input class="form-control" style="width:180px;padding:6px 10px" type="text"
          placeholder="Search…" oninput="DueDates._setSearch(this.value)"/>
        <button class="btn btn-warning btn-sm np" onclick="DueDates.seed()">🔁 Load FY Defaults</button>
        <button class="btn btn-outline btn-sm np"  onclick="DueDates.exportData()">⬇️ Export</button>
        <button class="btn btn-primary btn-sm np"  onclick="DueDates.openNew()">+ Add</button>
      </div>
      <div id="dd-table-wrap"></div>
    </div>`;
  }

  function _applyFilter() {
    let list = [..._records];
    if (_filter.category !== 'all') list = list.filter(r => r.category === _filter.category);
    if (_filter.status   !== 'all') {
      if (_filter.status === 'Done') list = list.filter(r => r.status === 'Done' || r.status === 'Completed');
      else                           list = list.filter(r => r.status === 'Pending' || !r.status);
    }
    if (_filter.search) {
      const q = _filter.search.toLowerCase();
      list = list.filter(r => (r.compliance||'').toLowerCase().includes(q) || (r.period||'').toLowerCase().includes(q));
    }
    list.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
    _renderTable(list);
  }

  function _renderTable(list) {
    const wrap = document.getElementById('dd-table-wrap');
    if (!wrap) return;
    if (!list.length) {
      wrap.innerHTML = `<div class="empty-state"><span class="es-icon">📅</span>
        <h3>No due dates found</h3>
        <p>Click "Load FY Defaults" to populate the full compliance calendar.</p>
        <button class="btn btn-warning np" onclick="DueDates.seed()">🔁 Load FY Defaults</button>
      </div>`;
      return;
    }
    wrap.innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Compliance</th><th>Category</th><th>Period</th>
        <th>Due Date</th><th>Days</th><th>Status</th>
        <th>Completed By</th><th>Remarks</th>
        <th class="np">Actions</th>
      </tr></thead>
      <tbody>
        ${list.map(r => {
          const days  = daysUntil(r.dueDate);
          const done  = r.status === 'Done' || r.status === 'Completed';
          const cls   = done ? 'dd-done' : days < 0 ? 'dd-overdue' : days <= 7 ? 'dd-soon' : 'dd-ok';
          const lbl   = done ? '✅ Done' : days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'TODAY' : `${days}d`;
          const rowBg = done ? '' : days < 0 ? 'background:#FEF2F2' : days <= 7 ? 'background:#FEFCE8' : '';
          return `<tr style="${rowBg}">
            <td style="font-weight:600">${esc(r.compliance)}</td>
            <td><span class="badge badge-blue">${esc(r.category||'—')}</span></td>
            <td style="font-size:11.5px;color:var(--muted)">${esc(r.period||'—')}</td>
            <td style="white-space:nowrap;font-weight:600">${fmtDate(r.dueDate)}</td>
            <td class="${cls}">${lbl}</td>
            <td>${done
              ? `<span class="badge badge-green">✅ Done</span>`
              : `<span class="badge badge-yellow">Pending</span>`
            }</td>
            <td style="font-size:11.5px;color:var(--muted)">${esc(r.completedBy||'—')}</td>
            <td style="font-size:11.5px;color:var(--muted)">${trunc(r.remarks||'—',30)}</td>
            <td class="np" style="white-space:nowrap">
              <button class="btn btn-${done?'outline':'success'} btn-sm"
                onclick="DueDates.toggleDone('${r.id}','${r.status||'Pending'}')">
                ${done ? '↩ Reopen' : '✅ Mark Done'}
              </button>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="DueDates.openEdit('${r.id}')">✏️</button>
              <button class="btn btn-danger btn-icon btn-sm" onclick="DueDates.delete('${r.id}')">🗑</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
  }

  function _ensureModal() {
    if (document.getElementById('modal-duedate')) return;
    const div = document.createElement('div');
    div.innerHTML = `
    <div class="modal-overlay" id="modal-duedate">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 id="dd-modal-title">Add Due Date</h3>
          <button class="modal-close" onclick="closeModal('modal-duedate')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full">
              <label>Category <span class="req">*</span></label>
              <select class="form-control" id="dd-cat" onchange="DueDates._onCatChange()">
                ${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}
              </select>
            </div>
            <div class="form-group full">
              <label>Compliance <span class="req">*</span></label>
              <select class="form-control" id="dd-comp">
                <option value="">— Select —</option>
              </select>
            </div>
            <div class="form-group">
              <label>Period</label>
              <input class="form-control" id="dd-period" placeholder="e.g. Apr 2025 / Q1 FY25-26"/>
            </div>
            <div class="form-group">
              <label>Due Date <span class="req">*</span></label>
              <input class="form-control" id="dd-date" type="date"/>
            </div>
            <div class="form-group full">
              <label>Status</label>
              <select class="form-control" id="dd-status">
                <option value="Pending">Pending</option>
                <option value="Done">Done</option>
                <option value="NA">N/A</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Completed By</label>
              <input class="form-control" id="dd-by" placeholder="Name of person"/>
            </div>
            <div class="form-group full">
              <label>Remarks</label>
              <input class="form-control" id="dd-rem" placeholder="Any notes"/>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-duedate')">Cancel</button>
          <button class="btn btn-primary" onclick="DueDates.save()">💾 Save</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div);
    _onCatChange();
  }

  let _editId = null;

  function _onCatChange() {
    const cat  = document.getElementById('dd-cat')?.value || CATEGORIES[0];
    const comp = document.getElementById('dd-comp');
    if (!comp) return;
    const opts = COMPLIANCES[cat] || ['Other'];
    comp.innerHTML = opts.map(c=>`<option value="${c}">${c}</option>`).join('');
  }

  function openNew() {
    _editId = null;
    document.getElementById('dd-modal-title').textContent = 'Add Due Date';
    ['dd-period','dd-date','dd-by','dd-rem'].forEach(id => { const el=document.getElementById(id); if(el)el.value=''; });
    document.getElementById('dd-cat').value    = CATEGORIES[0];
    document.getElementById('dd-status').value = 'Pending';
    _onCatChange();
    openModal('modal-duedate');
  }

  function openEdit(id) {
    _editId = id;
    const r = _records.find(x => x.id === id);
    if (!r) return;
    document.getElementById('dd-modal-title').textContent = 'Edit Due Date';
    document.getElementById('dd-cat').value    = r.category   || CATEGORIES[0];
    _onCatChange();
    document.getElementById('dd-comp').value   = r.compliance || '';
    document.getElementById('dd-period').value = r.period     || '';
    document.getElementById('dd-date').value   = r.dueDate    || '';
    document.getElementById('dd-status').value = r.status     || 'Pending';
    document.getElementById('dd-by').value     = r.completedBy|| '';
    document.getElementById('dd-rem').value    = r.remarks    || '';
    openModal('modal-duedate');
  }

  async function save() {
    const date = document.getElementById('dd-date').value;
    const comp = document.getElementById('dd-comp').value;
    if (!date) { toast('Due date is required', 'warning'); return; }
    if (!comp) { toast('Select a compliance type', 'warning'); return; }
    const btn = document.querySelector('#modal-duedate .btn-primary');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await API.saveDueDate({
        id:          _editId || null,
        compliance:  comp,
        category:    document.getElementById('dd-cat').value,
        period:      document.getElementById('dd-period').value,
        dueDate:     date,
        status:      document.getElementById('dd-status').value,
        completedBy: document.getElementById('dd-by').value,
        remarks:     document.getElementById('dd-rem').value
      });
      toast('✅ Due date saved', 'success');
      closeModal('modal-duedate');
      render();
    } catch(e) { toast('Error: '+e.message, 'error'); }
    finally { btn.disabled=false; btn.textContent='💾 Save'; }
  }

  async function toggleDone(id, currentStatus) {
    const done    = currentStatus === 'Done' || currentStatus === 'Completed';
    const newSt   = done ? 'Pending' : 'Done';
    const newBy   = done ? '' : (SESSION.user?.name || SESSION.user?.userId || '');
    try {
      await API.saveDueDate({ id, status: newSt, completedBy: newBy });
      toast(done ? '↩ Reopened' : '✅ Marked as Done', 'success');
      render();
    } catch(e) { toast('Error: '+e.message, 'error'); }
  }

  async function del(id) {
    const ok = await confirm('Delete this due date?', 'Delete');
    if (!ok) return;
    try { await API.deleteDueDate(id); toast('🗑 Deleted', 'success'); render(); }
    catch(e) { toast('Error: '+e.message, 'error'); }
  }

  async function seed() {
    const ok = await confirm(`Load all standard compliance dates for FY ${getCurrentFY()}?\nExisting entries will not be overwritten.`, 'Load FY Defaults');
    if (!ok) return;
    try {
      const r = await API.seedDueDates({ fy: getCurrentFY() });
      toast(`✅ ${r.seeded} due dates loaded for FY ${r.fy}`, 'success');
      render();
    } catch(e) { toast('Error: '+e.message, 'error'); }
  }

  function exportData() {
    if (!_records.length) { toast('No data to export', 'warning'); return; }
    const rows=[['Compliance','Category','Period','Due Date','Status','Completed By','Remarks']];
    _records.forEach(r=>rows.push([r.compliance,r.category||'',r.period||'',r.dueDate,r.status||'Pending',r.completedBy||'',r.remarks||'']));
    exportExcel(rows,'DueDates',`ComplianceCalendar_${getCurrentFY()}.xlsx`);
  }

  function _setCat(v)    { _filter.category = v; _applyFilter();
    ['all',...CATEGORIES].forEach(c=>{const el=document.getElementById('dd-cat-'+c.replace(/\s/g,'_'));if(el)el.classList.toggle('active',_filter.category===c);}); }
  function _setSt(v)     { _filter.status   = v; _applyFilter();
    ['all','Pending','Done'].forEach(s=>{const el=document.getElementById('dd-st-'+s);if(el)el.classList.toggle('active',_filter.status===s);}); }
  function _setSearch(q) { _filter.search   = q; _applyFilter(); }

  return { render, openNew, openEdit, save, toggleDone, delete: del, seed, exportData,
           _setCat, _setSt, _setSearch, _onCatChange };
})();

</script>

        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-client')">Cancel</button>
          <button class="btn btn-primary" onclick="Clients.save()">💾 Save Client</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div);
    populateStateSelect('cl-state');
  }

  function openNew() {
    _editId = null;
    document.getElementById('cl-modal-title').textContent = 'Add Client';
    ['cl-name','cl-gstin','cl-pan','cl-city','cl-addr','cl-cp','cl-ph','cl-em','cl-bnk','cl-bacc','cl-ifsc','cl-sc'].forEach(id=>{
      const el=document.getElementById(id); if(el)el.value='';});
    document.getElementById('cl-state').value='';
    openModal('modal-client');
  }

  function openEdit(id) {
    _editId = id;
    const c = _clients.find(x=>x.id===id);
    if (!c) return;
    document.getElementById('cl-modal-title').textContent = 'Edit Client';
    const map = {
      'cl-name':c.name,'cl-gstin':c.gstin,'cl-pan':c.pan,'cl-city':c.city,
      'cl-addr':c.address,'cl-cp':c.contactPerson,'cl-ph':c.phone,'cl-em':c.email,
      'cl-bnk':c.bankName,'cl-bacc':c.bankAcc,'cl-ifsc':c.bankIFSC,'cl-sc':c.stateCode
    };
    Object.entries(map).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v||'';});
    document.getElementById('cl-state').value = c.state || '';
    openModal('modal-client');
  }

  async function save() {
    const name = document.getElementById('cl-name').value.trim();
    if (!name) { toast('Client name is required', 'warning'); return; }
    const btn = document.querySelector('#modal-client .btn-primary');
    btn.disabled=true; btn.textContent='Saving…';
    try {
      await API.saveClient({
        id:            _editId||null,
        name,
        gstin:         document.getElementById('cl-gstin').value,
        pan:           document.getElementById('cl-pan').value,
        state:         document.getElementById('cl-state').value,
        stateCode:     document.getElementById('cl-sc').value,
        city:          document.getElementById('cl-city').value,
        address:       document.getElementById('cl-addr').value,
        contactPerson: document.getElementById('cl-cp').value,
        phone:         document.getElementById('cl-ph').value,
        email:         document.getElementById('cl-em').value,
        bankName:      document.getElementById('cl-bnk').value,
        bankAcc:       document.getElementById('cl-bacc').value,
        bankIFSC:      document.getElementById('cl-ifsc').value
      });
      toast('✅ Client saved', 'success');
      closeModal('modal-client');
      render();
    } catch(e) { toast('Error: '+e.message, 'error'); }
    finally { btn.disabled=false; btn.textContent='💾 Save Client'; }
  }

  async function del(id) {
    const c=_clients.find(x=>x.id===id);
    const ok=await confirm(`Delete client "${c?.name}"?`, 'Delete Client');
    if(!ok) return;
    try { await API.deleteClient(id); toast('🗑 Client deleted','success'); render(); }
    catch(e) { toast('Error: '+e.message,'error'); }
  }

  function exportData() {
    if(!_clients.length){toast('No clients','warning');return;}
    const rows=[['Name','GSTIN','PAN','State','City','Address','Contact Person','Phone','Email','Bank Name','Account','IFSC']];
    _clients.forEach(c=>rows.push([c.name,c.gstin||'',c.pan||'',c.state||'',c.city||'',c.address||'',c.contactPerson||'',c.phone||'',c.email||'',c.bankName||'',c.bankAcc||'',c.bankIFSC||'']));
    exportExcel(rows,'Clients','ClientMaster.xlsx');
  }

  function _setSearch(q) { _search=q; _applyFilter(); }

  return { render, openNew, openEdit, save, delete: del, exportData, _setSearch };
})();

</script>
<script>

    <div class="table-wrap"><table>

        <th>Emp ID</th><th>Name</th><th>Designation</th><th>Dept</th>

          <td style="font-family:monospace;font-size:11px">${e.esicNumber||'—'}</td>
          <td>${badge(e.status||'Active')}</td>
          <td class="np" style="white-space:nowrap">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="Employees.openEdit('${e.id}')">✏️</button>
            <button class="btn btn-danger btn-icon btn-sm" onclick="Employees.delete('${e.id}')">🗑</button>
          </td>
        </tr>`).join('')}

    </table></div>`;
  }

  function _ensureModal() {
    if(document.getElementById('modal-employee')) return;
    const div=document.createElement('div');
    div.innerHTML=`
    <div class="modal-overlay" id="modal-employee">
      <div class="modal modal-lg">
        <div class="modal-header">
          <h3 id="emp-modal-title">Add Employee</h3>
          <button class="modal-close" onclick="closeModal('modal-employee')">✕</button>
        </div>
        <div class="modal-body">
          <div class="tab-strip">
            <button class="tab-btn active" onclick="Employees._tab(this,'emp-personal')">Personal</button>
            <button class="tab-btn" onclick="Employees._tab(this,'emp-employment')">Employment</button>
            <button class="tab-btn" onclick="Employees._tab(this,'emp-pf')">PF</button>
            <button class="tab-btn" onclick="Employees._tab(this,'emp-esic')">ESIC</button>
            <button class="tab-btn" onclick="Employees._tab(this,'emp-kyc')">KYC & Bank</button>
          </div>

          <!-- Personal -->
          <div class="tab-panel active" id="emp-personal">
            <div class="form-grid">
              <div class="form-group"><label>Employee ID</label><input class="form-control" id="e-id" placeholder="EMP001"/></div>
              <div class="form-group"><label>Full Name <span class="req">*</span></label><input class="form-control" id="e-name" placeholder="As per Aadhaar"/></div>
              <div class="form-group"><label>Date of Birth</label><input class="form-control" id="e-dob" type="date"/></div>
              <div class="form-group"><label>Gender</label>
                <select class="form-control" id="e-gender"><option value="">—</option><option>Male</option><option>Female</option><option>Other</option></select></div>
              <div class="form-group"><label>Mobile</label><input class="form-control" id="e-mob" type="tel" placeholder="10-digit"/></div>
              <div class="form-group"><label>Email</label><input class="form-control" id="e-email" type="email"/></div>
              <div class="form-group full"><label>Address</label><textarea class="form-control" id="e-addr" rows="2"></textarea></div>
            </div>
          </div>

          <!-- Employment -->
          <div class="tab-panel" id="emp-employment">
            <div class="form-grid">
              <div class="form-group"><label>Date of Joining</label><input class="form-control" id="e-doj" type="date"/></div>
              <div class="form-group"><label>Department</label><input class="form-control" id="e-dept" placeholder="e.g. Operations"/></div>
              <div class="form-group"><label>Designation</label><input class="form-control" id="e-desg" placeholder="e.g. Site Engineer"/></div>
              <div class="form-group"><label>Monthly Salary (₹)</label><input class="form-control" id="e-sal" type="number" step="0.01" placeholder="0.00"/></div>
              <div class="form-group"><label>Status</label>
                <select class="form-control" id="e-status">
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                  <option value="Left">Left</option>
                </select>
              </div>
            </div>
          </div>

          <!-- PF -->
          <div class="tab-panel" id="emp-pf">
            <div class="form-grid">
              <div class="form-group"><label>UAN (Universal Account No.)</label><input class="form-control" id="e-uan" placeholder="12-digit UAN" maxlength="12"/></div>
              <div class="form-group"><label>PF Number</label><input class="form-control" id="e-pfno" placeholder="MH/PUN/XXXXX"/></div>
              <div class="form-group"><label>PF Nominee Name</label><input class="form-control" id="e-pfnom" placeholder="Full name"/></div>
              <div class="form-group"><label>Nominee Relation (PF)</label><input class="form-control" id="e-pfnomr" placeholder="e.g. Wife, Son"/></div>
              <div class="form-group"><label>Previous PF Balance (₹)</label><input class="form-control" id="e-prevpf" type="number" step="0.01" placeholder="0.00"/></div>
              <div class="form-group"><label>Previous Employer</label><input class="form-control" id="e-prevempl" placeholder="Previous company name"/></div>
            </div>
          </div>

          <!-- ESIC -->
          <div class="tab-panel" id="emp-esic">
            <div class="form-grid">
              <div class="form-group"><label>ESIC IP Number</label><input class="form-control" id="e-esic" placeholder="17-digit IP No." maxlength="17"/></div>
              <div class="form-group"><label>ESIC Nominee Name</label><input class="form-control" id="e-esicnom" placeholder="Full name"/></div>
              <div class="form-group"><label>Nominee Relation (ESIC)</label><input class="form-control" id="e-esicnomr" placeholder="e.g. Wife"/></div>
            </div>
          </div>

          <!-- KYC & Bank -->
          <div class="tab-panel" id="emp-kyc">
            <div class="form-grid">
              <div class="form-section">KYC</div>
              <div class="form-group"><label>Aadhaar Number</label><input class="form-control" id="e-aadhar" placeholder="12-digit" maxlength="12"/></div>
              <div class="form-group"><label>PAN Number</label><input class="form-control" id="e-pan" placeholder="AAAAA0000A" oninput="this.value=this.value.toUpperCase()" maxlength="10"/></div>

    document.body.appendChild(div);

  function _tab(btn, panelId) {
    document.querySelectorAll('#modal-employee .tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('#modal-employee .tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(panelId)?.classList.add('active');
  }

  const FIELDS = {
    'e-id':SESSION,'e-name':'name','e-dob':'dob','e-gender':'gender','e-mob':'mobile',
    'e-email':'email','e-addr':'address','e-doj':'doj','e-dept':'department',
    'e-desg':'designation','e-sal':'salary','e-status':'status',
    'e-uan':'uan','e-pfno':'pfNumber','e-pfnom':'pfNominee','e-pfnomr':'pfNomineeRel',
    'e-prevpf':'prevPF','e-prevempl':'prevEmployer',
    'e-esic':'esicNumber','e-esicnom':'esicNominee','e-esicnomr':'esicNomineeRel',
    'e-aadhar':'aadhaar','e-pan':'pan','e-bnk':'bankName','e-bacc':'bankAcc','e-ifsc':'bankIFSC'
  };

  function openNew() {
    _editId = null;
    document.getElementById('emp-modal-title').textContent = 'Add Employee';
    Object.keys(FIELDS).filter(k=>k!=='e-id').forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('e-id').value     = '';
    document.getElementById('e-status').value = 'Active';
    document.getElementById('e-gender').value = '';
    // Reset to first tab
    document.querySelectorAll('#modal-employee .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
    document.querySelectorAll('#modal-employee .tab-panel').forEach((p,i)=>p.classList.toggle('active',i===0));
    openModal('modal-employee');
  }

  function openEdit(id) {
    _editId = id;
    const e = _employees.find(x=>x.id===id);
    if (!e) return;
    document.getElementById('emp-modal-title').textContent = 'Edit — ' + e.name;
    const revMap = {
      'e-id':e.empId,'e-name':e.name,'e-dob':e.dob,'e-gender':e.gender,'e-mob':e.mobile,
      'e-email':e.email,'e-addr':e.address,'e-doj':e.doj,'e-dept':e.department,
      'e-desg':e.designation,'e-sal':e.salary,'e-status':e.status||'Active',
      'e-uan':e.uan,'e-pfno':e.pfNumber,'e-pfnom':e.pfNominee,'e-pfnomr':e.pfNomineeRel,
      'e-prevpf':e.prevPF,'e-prevempl':e.prevEmployer,
      'e-esic':e.esicNumber,'e-esicnom':e.esicNominee,'e-esicnomr':e.esicNomineeRel,
      'e-aadhar':e.aadhaar,'e-pan':e.pan,'e-bnk':e.bankName,'e-bacc':e.bankAcc,'e-ifsc':e.bankIFSC
    };
    Object.entries(revMap).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v||'';});
