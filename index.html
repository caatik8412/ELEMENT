    document.querySelectorAll('#modal-employee .tab-panel').forEach((p,i)=>p.classList.toggle('active',i===0));
    openModal('modal-employee');
  }

  async function save() {
    const name=document.getElementById('e-name').value.trim();
    if(!name){toast('Employee name is required','warning');return;}
    const btn=document.querySelector('#modal-employee .btn-primary');
    btn.disabled=true;btn.textContent='Saving…';
    const g=id=>{const el=document.getElementById(id);return el?el.value:'';};
    try {
      await API.saveEmployee({
        id:_editId||null,empId:g('e-id'),name,dob:g('e-dob'),gender:g('e-gender'),
        mobile:g('e-mob'),email:g('e-email'),address:g('e-addr'),doj:g('e-doj'),
        department:g('e-dept'),designation:g('e-desg'),salary:g('e-sal'),
        status:g('e-status'),uan:g('e-uan'),pfNumber:g('e-pfno'),
        pfNominee:g('e-pfnom'),pfNomineeRel:g('e-pfnomr'),
        prevPF:g('e-prevpf'),prevEmployer:g('e-prevempl'),
        esicNumber:g('e-esic'),esicNominee:g('e-esicnom'),esicNomineeRel:g('e-esicnomr'),
        aadhaar:g('e-aadhar'),pan:g('e-pan'),
        bankName:g('e-bnk'),bankAcc:g('e-bacc'),bankIFSC:g('e-ifsc')
      });
      toast('✅ Employee saved','success');
      closeModal('modal-employee');
      render();
    } catch(e){toast('Error: '+e.message,'error');}
    finally{btn.disabled=false;btn.textContent='💾 Save Employee';}
  }

  async function del(id) {
    const e=_employees.find(x=>x.id===id);
    const ok=await confirm(`Delete employee "${e?.name}"?`,'Delete Employee');
    if(!ok)return;
    try{await API.deleteEmployee(id);toast('🗑 Employee deleted','success');render();}
    catch(e){toast('Error: '+e.message,'error');}
  }

  function exportData() {
    if(!_employees.length){toast('No employees','warning');return;}
    const rows=[['Emp ID','Name','DOB','Gender','DOJ','Dept','Designation','Salary','UAN','PF No','ESIC No','Aadhaar','PAN','Status']];
    _employees.forEach(e=>rows.push([e.empId||'',e.name,e.dob||'',e.gender||'',e.doj||'',e.department||'',e.designation||'',e.salary||'',e.uan||'',e.pfNumber||'',e.esicNumber||'',e.aadhaar||'',e.pan||'',e.status||'']));
    exportExcel(rows,'Employees','EmployeeMaster.xlsx');
  }

  function _setSearch(q){_search=q;_applyFilter();}

  return { render, openNew, openEdit, save, delete: del, exportData, _setSearch, _tab };
})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — pfesi.js
   ============================================================ */

'use strict';

const PfEsi = (() => {

  let _pf   = [];
  let _esi  = [];
  let _emps = [];
  let _tab  = 'pf';
  let _selM = new Date().getMonth() + 1;
  let _selY = new Date().getFullYear();

  async function render() {
    [_pf, _esi, _emps] = await Promise.all([API.getPFWorking(), API.getESIWorking(), API.getEmployees()]);
    _renderShell();
    _renderContent();
    _ensureModal();
  }

  function _renderShell() {
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now   = new Date();
    const el    = document.getElementById('content');
    el.innerHTML=`
    <div class="card" style="padding:14px 20px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="pill-group">
          <button class="pill-btn ${_tab==='pf'?'active':''}" onclick="PfEsi._setTab('pf')">PF Working</button>
          <button class="pill-btn ${_tab==='esi'?'active':''}" onclick="PfEsi._setTab('esi')">ESI Working</button>
        </div>
        <select class="form-control" style="width:auto;padding:6px 12px" id="pf-sel-m" onchange="PfEsi._onPeriod()">
          ${months.map((m,i)=>`<option value="${i+1}"${i+1===_selM?' selected':''}>${m}</option>`).join('')}
        </select>
        <select class="form-control" style="width:auto;padding:6px 12px" id="pf-sel-y" onchange="PfEsi._onPeriod()">
          ${[now.getFullYear()-1,now.getFullYear(),now.getFullYear()+1].map(y=>`<option value="${y}"${y===_selY?' selected':''}>${y}</option>`).join('')}
        </select>
        <button class="btn btn-outline btn-sm np" onclick="PfEsi.exportECR()">⬇️ ECR Excel</button>
        <button class="btn btn-primary btn-sm np" onclick="PfEsi.openNew()">+ Add Entry</button>
      </div>
    </div>
    <div id="pf-content"></div>`;
  }

  function _renderContent() {
    const wrap  = document.getElementById('pf-content');
    if(!wrap) return;
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const label = `${months[_selM-1]} ${_selY}`;

    if(_tab==='pf') {
      const rows = _pf.filter(r=>+r.month===_selM && +r.year===_selY);
      const tEPF  = rows.reduce((s,r)=>s+(parseFloat(r.empPF)||0),0);
      const tEEPF = rows.reduce((s,r)=>s+(parseFloat(r.emplrEPF)||0),0);
      const tEPS  = rows.reduce((s,r)=>s+(parseFloat(r.emplrEPS)||0),0);
      const tEDLI = rows.reduce((s,r)=>s+(parseFloat(r.edli)||0),0);
      const tAdm  = rows.reduce((s,r)=>s+(parseFloat(r.adminCharges)||0),0);
      const tPF   = rows.reduce((s,r)=>s+(parseFloat(r.totalPF)||0),0);

      wrap.innerHTML=`
      <div class="pf-summary-grid">
        <div class="pf-box"><div class="pb-label">Emp PF (12%)</div><div class="pb-value">${fmtCur(tEPF)}</div></div>
        <div class="pf-box"><div class="pb-label">Emplr EPF (3.67%)</div><div class="pb-value">${fmtCur(tEEPF)}</div></div>
        <div class="pf-box"><div class="pb-label">EPS (8.33%)</div><div class="pb-value">${fmtCur(tEPS)}</div></div>
        <div class="pf-box"><div class="pb-label">EDLI</div><div class="pb-value">${fmtCur(tEDLI)}</div></div>
        <div class="pf-box"><div class="pb-label">Admin Charges</div><div class="pb-value">${fmtCur(tAdm)}</div></div>
        <div class="pf-box" style="border:2px solid var(--navy-400)"><div class="pb-label">Total PF Challan</div><div class="pb-value" style="color:var(--navy-600)">${fmtCur(tPF)}</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>PF Working — ${label}</h2></div>
        ${!rows.length
          ? `<div class="table-empty">No PF entries for ${label}. Click "+ Add Entry".</div>`
          : `<div class="table-wrap"><table>
              <thead><tr>
                <th>Emp</th><th>UAN</th><th>Days</th><th>PF Wages</th>
                <th>Emp PF</th><th>Emplr EPF</th><th>EPS</th><th>EDLI</th><th>Admin</th><th>Total</th>
                <th class="np">Del</th>
              </tr></thead>
              <tbody>
                ${rows.map(r=>`<tr>
                  <td style="font-weight:600">${esc(r.empName)}</td>
                  <td style="font-family:monospace;font-size:11px">${r.uan||'—'}</td>
                  <td>${r.presentDays||0}/${r.totalDays||30}</td>
                  <td>${fmtCur(r.pfWages)}</td>
                  <td>${fmtCur(r.empPF)}</td>
                  <td>${fmtCur(r.emplrEPF)}</td>
                  <td>${fmtCur(r.emplrEPS)}</td>
                  <td>${fmtCur(r.edli)}</td>
                  <td>${fmtCur(r.adminCharges)}</td>
                  <td style="font-weight:700">${fmtCur(r.totalPF)}</td>
                  <td class="np"><button class="btn btn-danger btn-icon btn-sm"
                    onclick="PfEsi.deleteEntry('pf','${r.id}')">🗑</button></td>
                </tr>`).join('')}
              </tbody>
              <tfoot><tr>
                <td colspan="3">Total</td>
                <td></td>
                <td>${fmtCur(tEPF)}</td><td>${fmtCur(tEEPF)}</td>
                <td>${fmtCur(tEPS)}</td><td>${fmtCur(tEDLI)}</td><td>${fmtCur(tAdm)}</td>
                <td>${fmtCur(tPF)}</td><td class="np"></td>
              </tr></tfoot>
            </table></div>`}
      </div>`;
    } else {
      const rows = _esi.filter(r=>+r.month===_selM && +r.year===_selY);
      const tEmp = rows.reduce((s,r)=>s+(parseFloat(r.empESIC)||0),0);
      const tEml = rows.reduce((s,r)=>s+(parseFloat(r.emplrESIC)||0),0);
      const tTot = rows.reduce((s,r)=>s+(parseFloat(r.totalESIC)||0),0);

      wrap.innerHTML=`
      <div class="pf-summary-grid">
        <div class="pf-box"><div class="pb-label">Emp ESI (0.75%)</div><div class="pb-value">${fmtCur(tEmp)}</div></div>
        <div class="pf-box"><div class="pb-label">Emplr ESI (3.25%)</div><div class="pb-value">${fmtCur(tEml)}</div></div>
        <div class="pf-box" style="border:2px solid var(--navy-400)"><div class="pb-label">Total ESI Challan</div><div class="pb-value" style="color:var(--navy-600)">${fmtCur(tTot)}</div></div>
        <div class="pf-box"><div class="pb-label">Eligible Employees</div><div class="pb-value">${rows.filter(r=>r.eligible==='Yes').length}</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>ESI Working — ${label}</h2></div>
        ${!rows.length
          ? `<div class="table-empty">No ESI entries for ${label}. Click "+ Add Entry".</div>`
          : `<div class="table-wrap"><table>
              <thead><tr>
                <th>Emp</th><th>ESIC No</th><th>Days</th>
                <th>ESI Wages</th><th>Emp ESI</th><th>Emplr ESI</th><th>Total</th><th>Eligible</th>
                <th class="np">Del</th>
              </tr></thead>
              <tbody>
                ${rows.map(r=>`<tr>
                  <td style="font-weight:600">${esc(r.empName)}</td>
                  <td style="font-family:monospace;font-size:11px">${r.esicNo||'—'}</td>
                  <td>${r.presentDays||0}/${r.totalDays||30}</td>
                  <td>${fmtCur(r.esicWages)}</td>
                  <td>${fmtCur(r.empESIC)}</td>
                  <td>${fmtCur(r.emplrESIC)}</td>
                  <td style="font-weight:700">${fmtCur(r.totalESIC)}</td>
                  <td>${badge(r.eligible==='Yes'?'Active':'Inactive')}</td>
                  <td class="np"><button class="btn btn-danger btn-icon btn-sm"
                    onclick="PfEsi.deleteEntry('esi','${r.id}')">🗑</button></td>
                </tr>`).join('')}
              </tbody>
              <tfoot><tr>
                <td colspan="3">Total</td>
                <td></td><td>${fmtCur(tEmp)}</td><td>${fmtCur(tEml)}</td>
                <td>${fmtCur(tTot)}</td><td></td><td class="np"></td>
              </tr></tfoot>
            </table></div>`}
      </div>`;
    }
  }

  function _ensureModal() {
    if(document.getElementById('modal-pfesi')) return;
    const div=document.createElement('div');
    div.innerHTML=`
    <div class="modal-overlay" id="modal-pfesi">
      <div class="modal">
        <div class="modal-header">
          <h3 id="pf-modal-title">PF &amp; ESI Entry</h3>
          <button class="modal-close" onclick="closeModal('modal-pfesi')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-section">Period &amp; Employee</div>
            <div class="form-group">
              <label>Month</label>
              <select class="form-control" id="pf-m">
                ${['January','February','March','April','May','June','July','August','September','October','November','December'].map((m,i)=>`<option value="${i+1}">${m}</option>`).join('')}
              </select>
            </div>
            <div class="form-group"><label>Year</label><input class="form-control" id="pf-y" type="number" value="${new Date().getFullYear()}"/></div>
            <div class="form-group full">
              <label>Employee <span class="req">*</span></label>
              <select class="form-control" id="pf-emp" onchange="PfEsi._onEmpChange()">
                <option value="">— Select Employee —</option>
              </select>
            </div>
            <div class="form-group"><label>UAN</label><input class="form-control" id="pf-uan" readonly/></div>
            <div class="form-group"><label>ESIC No.</label><input class="form-control" id="pf-esicno" readonly/></div>

            <div class="form-section">Attendance &amp; Salary</div>
            <div class="form-group"><label>Total Days</label><input class="form-control" id="pf-td" type="number" value="30" oninput="PfEsi._calc()"/></div>
            <div class="form-group"><label>Present Days</label><input class="form-control" id="pf-pd" type="number" placeholder="0" oninput="PfEsi._calc()"/></div>
            <div class="form-group"><label>Gross Monthly Salary (₹)</label><input class="form-control" id="pf-gross" type="number" step="0.01" placeholder="0" oninput="PfEsi._calc()"/></div>
            <div class="form-group"><label>PF Wages Ceiling (₹)</label><input class="form-control" id="pf-ceil" type="number" value="15000" oninput="PfEsi._calc()"/></div>

            <div class="form-section">Computed — PF</div>
            <div class="form-group"><label>Proportional Gross (₹)</label><input class="form-control" id="pf-pgross" readonly/></div>
            <div class="form-group"><label>PF Wages (₹)</label><input class="form-control" id="pf-pfwages" readonly/></div>
            <div class="form-group"><label>Emp PF 12% (₹)</label><input class="form-control" id="pf-epf" readonly/></div>
            <div class="form-group"><label>Emplr EPF 3.67% (₹)</label><input class="form-control" id="pf-repf" readonly/></div>
            <div class="form-group"><label>EPS 8.33% (₹)</label><input class="form-control" id="pf-eps" readonly/></div>
            <div class="form-group"><label>EDLI (₹)</label><input class="form-control" id="pf-edli" readonly/></div>
            <div class="form-group"><label>Admin Charges (₹)</label><input class="form-control" id="pf-adm" readonly/></div>
            <div class="form-group"><label>Total PF Challan (₹)</label><input class="form-control" id="pf-tot" readonly style="font-weight:800"/></div>

            <div class="form-section">Computed — ESI</div>
            <div class="form-group"><label>ESI Eligible? (≤₹21,000)</label><input class="form-control" id="pf-esielig" readonly/></div>
            <div class="form-group"><label>ESI Wages (₹)</label><input class="form-control" id="pf-esiwages" readonly/></div>
            <div class="form-group"><label>Emp ESI 0.75% (₹)</label><input class="form-control" id="pf-eesi" readonly/></div>
            <div class="form-group"><label>Emplr ESI 3.25% (₹)</label><input class="form-control" id="pf-resi" readonly/></div>
            <div class="form-group"><label>Total ESI Challan (₹)</label><input class="form-control" id="pf-esitot" readonly style="font-weight:800"/></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-pfesi')">Cancel</button>
          <button class="btn btn-primary" onclick="PfEsi.save()">💾 Save Entry</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div);
    _populateEmpSelect();
  }

  function _populateEmpSelect() {
    const sel=document.getElementById('pf-emp');
    if(!sel) return;
    sel.innerHTML=`<option value="">— Select Employee —</option>`+
      _emps.filter(e=>e.status==='Active').map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('');
  }

  function _onEmpChange() {
    const id=document.getElementById('pf-emp').value;
    const emp=_emps.find(e=>e.id===id);
    if(emp){
      document.getElementById('pf-uan').value    = emp.uan        || '';
      document.getElementById('pf-esicno').value = emp.esicNumber || '';
      if(emp.salary) document.getElementById('pf-gross').value = emp.salary;
      _calc();
    }
  }

  function _calc() {
    const gross = parseFloat(document.getElementById('pf-gross')?.value)||0;
    const td    = parseInt(document.getElementById('pf-td')?.value)||30;
    const pd    = parseInt(document.getElementById('pf-pd')?.value)||0;
    const ceil  = parseFloat(document.getElementById('pf-ceil')?.value)||15000;

    const pg    = td>0 ? gross*pd/td : 0;
    const pfw   = Math.min(pg, ceil);
    const epf   = Math.round(pfw*0.12*100)/100;
    const eps   = Math.round(Math.min(pfw,15000)*0.0833*100)/100;
    const repf  = Math.round((pfw*0.12 - eps)*100)/100;
    const edli  = Math.round(Math.min(pfw,15000)*0.005*100)/100;
    const adm   = Math.round(pfw*0.01*100)/100;
    const totPF = epf + repf + eps + edli + adm;

    const esiElig = pg <= 21000;
    const esiwages= esiElig ? pg : 0;
    const eesi    = esiElig ? Math.round(esiwages*0.0075*100)/100 : 0;
    const resi    = esiElig ? Math.round(esiwages*0.0325*100)/100 : 0;
    const totESI  = eesi + resi;

    const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=typeof v==='number'?v.toFixed(2):v;};
    sv('pf-pgross',pg); sv('pf-pfwages',pfw); sv('pf-epf',epf);
    sv('pf-repf',repf); sv('pf-eps',eps); sv('pf-edli',edli);
    sv('pf-adm',adm); sv('pf-tot',totPF);
    document.getElementById('pf-esielig').value = esiElig ? `Yes (≤₹21,000)` : `No (>₹21,000)`;
    sv('pf-esiwages',esiwages); sv('pf-eesi',eesi); sv('pf-resi',resi); sv('pf-esitot',totESI);
  }

  function openNew() {
    document.getElementById('pf-modal-title').textContent = _tab==='pf'?'PF Working Entry':'ESI Working Entry';
    document.getElementById('pf-m').value   = _selM;
    document.getElementById('pf-y').value   = _selY;
    document.getElementById('pf-td').value  = 30;
    document.getElementById('pf-ceil').value= 15000;
    ['pf-emp','pf-uan','pf-esicno','pf-pd','pf-gross','pf-pgross','pf-pfwages',
     'pf-epf','pf-repf','pf-eps','pf-edli','pf-adm','pf-tot',
     'pf-esielig','pf-esiwages','pf-eesi','pf-resi','pf-esitot'].forEach(id=>{
      const el=document.getElementById(id);if(el&&id!=='pf-td'&&id!=='pf-ceil')el.value='';});
    _populateEmpSelect();
    openModal('modal-pfesi');
  }

  async function save() {
    const empId=document.getElementById('pf-emp').value;
    const emp=_emps.find(e=>e.id===empId);
    if(!empId||!emp){toast('Select an employee','warning');return;}
    const btn=document.querySelector('#modal-pfesi .btn-primary');
    btn.disabled=true;btn.textContent='Saving…';
    const g=id=>document.getElementById(id)?.value||'';
    const m=+g('pf-m'), y=+g('pf-y');
    try {
      await API.savePFEntry({
        month:m,year:y,empId,empName:emp.name,uan:g('pf-uan'),
        totalDays:g('pf-td'),presentDays:g('pf-pd'),grossSalary:g('pf-gross'),
        pfWages:g('pf-pfwages'),empPF:g('pf-epf'),emplrEPF:g('pf-repf'),
        emplrEPS:g('pf-eps'),edli:g('pf-edli'),adminCharges:g('pf-adm'),totalPF:g('pf-tot')
      });
      await API.saveESIEntry({
        month:m,year:y,empId,empName:emp.name,esicNo:g('pf-esicno'),
        totalDays:g('pf-td'),presentDays:g('pf-pd'),grossSalary:g('pf-gross'),
        esicWages:g('pf-esiwages'),empESIC:g('pf-eesi'),emplrESIC:g('pf-resi'),
        totalESIC:g('pf-esitot'),eligible:g('pf-esielig').startsWith('Yes')?'Yes':'No'
      });
      toast('✅ PF & ESI entry saved','success');
      closeModal('modal-pfesi');
      _selM=m; _selY=y;
      render();
    } catch(e){toast('Error: '+e.message,'error');}
    finally{btn.disabled=false;btn.textContent='💾 Save Entry';}
  }

  async function deleteEntry(type, id) {
    const ok=await confirm('Delete this entry?','Delete');
    if(!ok) return;
    try {
      if(type==='pf') await API.deletePFEntry(id);
      else            await API.deleteESIEntry(id);
      toast('🗑 Deleted','success');
      render();
    } catch(e){toast('Error: '+e.message,'error');}
  }

  function exportECR() {
    const rows=_pf.filter(r=>+r.month===_selM&&+r.year===_selY);
    if(!rows.length){toast('No PF data for this period','warning');return;}
    const data=[['UAN','Employee Name','Total Days','Present Days','PF Wages','Gross EPF (12%)','EPS Wages','Gross EPS (8.33%)','EPF Diff (3.67%)','Emp PF (12%)','NCP Days','EDLI','Admin Charges','Total PF']];
    rows.forEach(r=>data.push([r.uan||'',r.empName,+r.totalDays||30,+r.presentDays||0,r.pfWages,+r.emplrEPF+(+r.emplrEPS||0),Math.min(+r.pfWages,15000),r.emplrEPS,r.emplrEPF,(+r.empPF||0),(+r.totalDays||30)-(+r.presentDays||0),r.edli,r.adminCharges,r.totalPF]));
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    exportExcel(data,'ECR',`ECR_${months[_selM-1]}_${_selY}.xlsx`);
  }

  function _setTab(t){_tab=t;_renderShell();_renderContent();}
  function _onPeriod(){_selM=+document.getElementById('pf-sel-m').value;_selY=+document.getElementById('pf-sel-y').value;_renderContent();}

  return { render, openNew, save, deleteEntry, exportECR, _setTab, _onPeriod, _onEmpChange, _calc };
})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — reports.js
   ============================================================ */

'use strict';

const Reports = (() => {

  let _activeReport = 'sales';
  let _from = '', _to = '';

  async function render() {
    const now  = new Date();
    const y    = now.getFullYear();
    const m    = now.getMonth() + 1;
    _from = m >= 4 ? `${y}-04-01` : `${y-1}-04-01`;
    _to   = today();

    document.getElementById('content').innerHTML = `
    <div class="card" style="padding:14px 20px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="pill-group">
          ${[
            ['sales','Sales Register'],['purchase','Purchase Register'],
            ['gst','GST Summary'],['outstanding','Outstanding'],
            ['pfReg','PF Register'],['esiReg','ESI Register']
          ].map(([k,l])=>`<button class="pill-btn ${k===_activeReport?'active':''}"
            id="rep-pill-${k}" onclick="Reports._setReport('${k}')">${l}</button>`).join('')}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap">
        <label style="font-size:11px;font-weight:700;color:var(--muted)">FROM</label>
        <input class="form-control" style="width:150px;padding:6px 10px" type="date" id="rep-from" value="${_from}" onchange="Reports._onDateChange()"/>
        <label style="font-size:11px;font-weight:700;color:var(--muted)">TO</label>
        <input class="form-control" style="width:150px;padding:6px 10px" type="date" id="rep-to" value="${_to}" onchange="Reports._onDateChange()"/>
        <button class="btn btn-outline btn-sm np" onclick="Reports._load()">Apply</button>
        <button class="btn btn-accent btn-sm np" onclick="Reports._export()">⬇️ Export Excel</button>
        <button class="btn btn-outline btn-sm np" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
    <div id="rep-content"><div class="page-loader"><span class="spinner"></span>Loading…</div></div>`;

    await _load();
  }

  async function _load() {
    _from = document.getElementById('rep-from')?.value || _from;
    _to   = document.getElementById('rep-to')?.value   || _to;
    const wrap = document.getElementById('rep-content');
    if(!wrap) return;
    wrap.innerHTML = `<div class="page-loader"><span class="spinner"></span>Loading…</div>`;
    try {
      if(_activeReport==='sales')      await _renderSales(wrap);
      else if(_activeReport==='purchase') await _renderPurchase(wrap);
      else if(_activeReport==='gst')    await _renderGST(wrap);
      else if(_activeReport==='outstanding') await _renderOutstanding(wrap);
      else if(_activeReport==='pfReg')  await _renderPFReg(wrap);
      else if(_activeReport==='esiReg') await _renderESIReg(wrap);
    } catch(e){ wrap.innerHTML=`<div class="card"><p style="color:var(--red)">⚠️ ${e.message}</p></div>`; }
  }

  async function _renderSales(wrap) {
    const rows = await API.getSalesRegister({ from:_from, to:_to });
    const tot  = rows.reduce((s,r)=>s+(parseFloat(r.totalAmount)||0),0);
    const totTx= rows.reduce((s,r)=>s+(parseFloat(r.taxableValue)||0),0);
    const totGST=rows.reduce((s,r)=>s+(parseFloat(r.cgst)||0)+(parseFloat(r.sgst)||0)+(parseFloat(r.igst)||0),0);
    wrap.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--navy-400)"><div class="s-label">Total Invoices</div><div class="s-value">${rows.length}</div></div>
      <div class="stat-card" style="--c:var(--navy-400)"><div class="s-label">Taxable Value</div><div class="s-value">${fmtCur(totTx)}</div></div>
      <div class="stat-card" style="--c:var(--navy-400)"><div class="s-label">Total GST</div><div class="s-value">${fmtCur(totGST)}</div></div>
      <div class="stat-card" style="--c:var(--navy-400)"><div class="s-label">Invoice Value</div><div class="s-value">${fmtCur(tot)}</div></div>
    </div>
    <div class="card"><div class="card-header"><h2>Sales Register — ${fmtDate(_from)} to ${fmtDate(_to)}</h2></div>
    ${!rows.length?`<div class="table-empty">No invoices in this period</div>`:
    `<div class="table-wrap"><table>
      <thead><tr><th>Invoice No</th><th>Date</th><th>Type</th><th>Client</th><th>GSTIN</th><th>Supply</th><th>Taxable</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td style="font-weight:700;font-family:monospace;font-size:11.5px">${esc(r.invoiceNo)}</td>
        <td>${fmtDate(r.invoiceDate)}</td>
        <td>${badge(r.docType||'Invoice')}</td>
        <td>${trunc(r.clientName,20)}</td>
        <td style="font-size:11px;font-family:monospace">${r.clientGSTIN||'—'}</td>
        <td>${badge(r.supplyType||'—')}</td>
        <td>${fmtCur(r.taxableValue)}</td>
        <td>${fmtCur(r.cgst)}</td>
        <td>${fmtCur(r.sgst)}</td>
        <td>${fmtCur(r.igst)}</td>
        <td style="font-weight:700">${fmtCur(r.totalAmount)}</td>
        <td>${badge(r.status)}</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr><td colspan="6">Total</td><td>${fmtCur(totTx)}</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.cgst)||0),0))}</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.sgst)||0),0))}</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.igst)||0),0))}</td>
        <td>${fmtCur(tot)}</td><td></td>
      </tr></tfoot>
    </table></div>`}
    </div>`;
  }

  async function _renderPurchase(wrap) {
    const rows = await API.getPurchaseRegister({ from:_from, to:_to });
    const tot  = rows.reduce((s,r)=>s+(parseFloat(r.totalAmount)||0),0);
    const totGST=rows.reduce((s,r)=>s+(parseFloat(r.cgst)||0)+(parseFloat(r.sgst)||0)+(parseFloat(r.igst)||0),0);
    wrap.innerHTML=`
    <div class="card"><div class="card-header"><h2>Purchase Register — ${fmtDate(_from)} to ${fmtDate(_to)}</h2></div>
    ${!rows.length?`<div class="table-empty">No purchases in this period</div>`:
    `<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Vendor</th><th>GSTIN</th><th>Inv No</th><th>Category</th><th>Taxable</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total</th><th>Pmt</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${fmtDate(r.purchaseDate)}</td>
        <td style="font-weight:600">${trunc(r.vendorName,20)}</td>
        <td style="font-size:11px;font-family:monospace">${r.vendorGSTIN||'—'}</td>
        <td style="font-size:11.5px">${r.vendorInvoiceNo||'—'}</td>
        <td><span class="badge badge-gray">${r.expenseCategory||'—'}</span></td>
        <td>${fmtCur(r.taxableValue)}</td>
        <td>${fmtCur(r.cgst)}</td><td>${fmtCur(r.sgst)}</td><td>${fmtCur(r.igst)}</td>
        <td style="font-weight:700">${fmtCur(r.totalAmount)}</td>
        <td>${badge(r.paymentStatus||'Unpaid')}</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr><td colspan="5">Total (${rows.length})</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.taxableValue)||0),0))}</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.cgst)||0),0))}</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.sgst)||0),0))}</td>
        <td>${fmtCur(rows.reduce((s,r)=>s+(parseFloat(r.igst)||0),0))}</td>
        <td>${fmtCur(tot)}</td><td></td>
      </tr></tfoot>
    </table></div>`}
    </div>`;
  }

  async function _renderGST(wrap) {
    const s = await API.getGSTSummary({ from:_from, to:_to });
    wrap.innerHTML=`
    <div class="gst3b-grid">
      <div class="gst3b-box">
        <h3>📤 Output Tax</h3>
        <div class="gst3b-row"><span>CGST</span><span>${fmtCur(s.output.cgst)}</span></div>
        <div class="gst3b-row"><span>SGST</span><span>${fmtCur(s.output.sgst)}</span></div>
        <div class="gst3b-row"><span>IGST</span><span>${fmtCur(s.output.igst)}</span></div>
        <div class="gst3b-row"><span>Total Output</span><span>${fmtCur(s.output.total)}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px">${s.invoiceCount} invoice${s.invoiceCount!==1?'s':''}</div>
      </div>
      <div class="gst3b-box">
        <h3>📥 ITC (Matched Purchases)</h3>
        <div class="gst3b-row"><span>CGST</span><span>${fmtCur(s.itc.cgst)}</span></div>
        <div class="gst3b-row"><span>SGST</span><span>${fmtCur(s.itc.sgst)}</span></div>
        <div class="gst3b-row"><span>IGST</span><span>${fmtCur(s.itc.igst)}</span></div>
        <div class="gst3b-row"><span>Total ITC</span><span style="color:var(--green)">${fmtCur(s.itc.total)}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px">${s.eligibleCount} matched purchase${s.eligibleCount!==1?'s':''}</div>
      </div>
    </div>
    <div class="gst3b-net-grid">
      <div class="gst3b-net-box"><div class="nl">Net CGST</div><div class="nv" style="color:${s.net.cgst>0?'var(--red)':'var(--green)'}">${fmtCur(s.net.cgst)}</div></div>
      <div class="gst3b-net-box"><div class="nl">Net SGST</div><div class="nv" style="color:${s.net.sgst>0?'var(--red)':'var(--green)'}">${fmtCur(s.net.sgst)}</div></div>
      <div class="gst3b-net-box"><div class="nl">Net IGST</div><div class="nv" style="color:${s.net.igst>0?'var(--red)':'var(--green)'}">${fmtCur(s.net.igst)}</div></div>
      <div class="gst3b-net-box" style="border-left:2px solid var(--border)">
        <div class="nl">Total GST Payable</div>
        <div class="nv" style="font-size:26px;color:${s.net.total>0?'var(--red)':'var(--green)'}">${fmtCur(s.net.total)}</div>
      </div>
    </div>`;
  }

  async function _renderOutstanding(wrap) {
    const rows = await API.getOutstanding();
    const tot  = rows.reduce((s,r)=>s+(parseFloat(r.balance)||0),0);
    wrap.innerHTML=`
    <div class="card"><div class="card-header"><h2>Outstanding Report</h2></div>
    ${!rows.length?`<div class="table-empty">No outstanding records</div>`:
    `<div class="table-wrap"><table>
      <thead><tr><th>Invoice No</th><th>Client</th><th>Date</th><th>Total</th><th>Received</th><th>Balance</th><th>Days</th><th>Status</th></tr></thead>
      <tbody>${rows.filter(r=>r.status!=='Paid').sort((a,b)=>(parseFloat(b.balance)||0)-(parseFloat(a.balance)||0)).map(r=>`<tr>
        <td style="font-weight:700;font-family:monospace;font-size:11.5px">${esc(r.invoiceNo)}</td>
        <td style="font-weight:600">${trunc(r.clientName,22)}</td>
        <td>${fmtDate(r.invoiceDate)}</td>
        <td>${fmtCur(r.totalAmount)}</td>
        <td style="color:var(--green)">${fmtCur(r.received)}</td>
        <td style="font-weight:700;color:var(--red)">${fmtCur(r.balance)}</td>
        <td>${ageBadge(parseInt(r.daysOutstanding)||0)}</td>
        <td>${badge(r.status)}</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr><td colspan="3">Total Outstanding</td><td></td><td></td><td style="font-weight:700;color:var(--red)">${fmtCur(tot)}</td><td colspan="2"></td></tr></tfoot>
    </table></div>`}
    </div>`;
  }

  async function _renderPFReg(wrap) {
    const rows = await API.getPFRegister();
    wrap.innerHTML=`
    <div class="card"><div class="card-header"><h2>PF Register</h2></div>
    ${!rows.length?`<div class="table-empty">No PF entries</div>`:
    `<div class="table-wrap"><table>
      <thead><tr><th>Month</th><th>Year</th><th>Employee</th><th>UAN</th><th>PF Wages</th><th>Emp PF</th><th>Emplr EPF</th><th>EPS</th><th>EDLI</th><th>Admin</th><th>Total</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${r.month}</td><td>${r.year}</td>
        <td style="font-weight:600">${esc(r.empName)}</td>
        <td style="font-family:monospace;font-size:11px">${r.uan||'—'}</td>
        <td>${fmtCur(r.pfWages)}</td><td>${fmtCur(r.empPF)}</td><td>${fmtCur(r.emplrEPF)}</td>
        <td>${fmtCur(r.emplrEPS)}</td><td>${fmtCur(r.edli)}</td><td>${fmtCur(r.adminCharges)}</td>
        <td style="font-weight:700">${fmtCur(r.totalPF)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
    </div>`;
  }

  async function _renderESIReg(wrap) {
    const rows = await API.getESIRegister();
    wrap.innerHTML=`
    <div class="card"><div class="card-header"><h2>ESI Register</h2></div>
    ${!rows.length?`<div class="table-empty">No ESI entries</div>`:
    `<div class="table-wrap"><table>
      <thead><tr><th>Month</th><th>Year</th><th>Employee</th><th>ESIC No</th><th>ESI Wages</th><th>Emp ESI</th><th>Emplr ESI</th><th>Total</th><th>Eligible</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${r.month}</td><td>${r.year}</td>
        <td style="font-weight:600">${esc(r.empName)}</td>
        <td style="font-family:monospace;font-size:11px">${r.esicNo||'—'}</td>
        <td>${fmtCur(r.esicWages)}</td><td>${fmtCur(r.empESIC)}</td>
        <td>${fmtCur(r.emplrESIC)}</td>
        <td style="font-weight:700">${fmtCur(r.totalESIC)}</td>
        <td>${badge(r.eligible==='Yes'?'Active':'Inactive')}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
    </div>`;
  }

  async function _export() {
    if(_activeReport==='gst'){toast('Use browser print for GST Summary','info');return;}
    const wrap=document.getElementById('rep-content');
    const rows=[...wrap.querySelectorAll('tbody tr')].map(tr=>[...tr.querySelectorAll('td')].map(td=>td.textContent.trim()));
    const hdrs=[...wrap.querySelectorAll('thead th')].map(th=>th.textContent.trim());
    if(!rows.length){toast('No data to export','warning');return;}
    exportExcel([hdrs,...rows],_activeReport,`${_activeReport}_report_${getCurrentFY()}.xlsx`);
  }

  function _setReport(r){_activeReport=r;
    document.querySelectorAll('[id^="rep-pill-"]').forEach(el=>el.classList.remove('active'));
    document.getElementById('rep-pill-'+r)?.classList.add('active');
    _load();
  }
  function _onDateChange(){_from=document.getElementById('rep-from')?.value||_from;_to=document.getElementById('rep-to')?.value||_to;}

  return { render, _setReport, _onDateChange, _load, _export };
})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — settings.js
   ============================================================ */

'use strict';

const Settings = (() => {

  let _section  = 'company';
  let _settings = {};
  let _users    = [];

  async function render() {
    [_settings, _users] = await Promise.all([API.getSettings(), API.getUsers()]);
    _renderShell();
    _renderSection();
  }

  function _renderShell() {
    document.getElementById('content').innerHTML = `
    <div class="settings-grid">
      <div class="settings-nav">
        ${[
          ['company',  '🏢', 'Company Profile'],
          ['invoice',  '🧾', 'Invoice Series'],
          ['users',    '👤', 'User Management'],
          ['activity', '📋', 'Activity Log'],
          ['backup',   '💾', 'Backup & Reset'],
        ].map(([k,ic,l])=>`<div class="settings-nav-item ${k===_section?'active':''}"
          onclick="Settings._setSection('${k}')">
          <span class="si">${ic}</span>${l}</div>`).join('')}
      </div>
      <div id="settings-panel"></div>
    </div>`;
    _renderSection();
  }

  function _renderSection() {
    const panel = document.getElementById('settings-panel');
    if(!panel) return;

    if(_section==='company')  _renderCompany(panel);
    else if(_section==='invoice') _renderInvoice(panel);
    else if(_section==='users')   _renderUsers(panel);
    else if(_section==='activity')_renderActivity(panel);
    else if(_section==='backup')  _renderBackup(panel);
  }

  function _renderCompany(panel) {
    const s = _settings;
    panel.innerHTML=`
    <div class="card">
      <div class="card-header"><h2>Company Profile</h2></div>
      <div class="form-grid">
        <div class="form-section">Company Details</div>
        <div class="form-group full"><label>Company Name</label><input class="form-control" id="s-coname" value="${esc(s.companyName||APP.COMPANY.name)}"/></div>
        <div class="form-group"><label>GSTIN</label><input class="form-control" id="s-gstin" value="${esc(s.gstin||APP.COMPANY.gstin)}" oninput="this.value=this.value.toUpperCase()"/></div>
        <div class="form-group"><label>CIN</label><input class="form-control" id="s-cin" value="${esc(s.cin||APP.COMPANY.cin)}"/></div>
        <div class="form-group"><label>PAN</label><input class="form-control" id="s-pan" value="${esc(s.pan||APP.COMPANY.pan)}"/></div>
        <div class="form-group full"><label>Address Line 1</label><input class="form-control" id="s-addr1" value="${esc(s.address1||APP.COMPANY.addr1)}"/></div>
        <div class="form-group full"><label>Address Line 2</label><input class="form-control" id="s-addr2" value="${esc(s.address2||APP.COMPANY.addr2)}"/></div>
        <div class="form-group"><label>Email</label><input class="form-control" id="s-email" type="email" value="${esc(s.email||APP.COMPANY.email)}"/></div>
        <div class="form-group"><label>Website</label><input class="form-control" id="s-web" value="${esc(s.website||APP.COMPANY.web)}"/></div>
        <div class="form-section">Bank Details</div>
        <div class="form-group"><label>Bank Name</label><input class="form-control" id="s-bnk" value="${esc(s.bankName||APP.COMPANY.bank)}"/></div>
        <div class="form-group"><label>Account Number</label><input class="form-control" id="s-bacc" value="${esc(s.bankAcc||APP.COMPANY.acc)}"/></div>
        <div class="form-group"><label>IFSC Code</label><input class="form-control" id="s-bifsc" value="${esc(s.bankIFSC||APP.COMPANY.ifsc)}" oninput="this.value=this.value.toUpperCase()"/></div>
        <div class="form-group"><label>Branch</label><input class="form-control" id="s-bbranch" value="${esc(s.bankBranch||APP.COMPANY.branch)}"/></div>
        <div class="form-group full" style="margin-top:8px">
          <button class="btn btn-primary np" onclick="Settings._saveCompany()">💾 Save Company Profile</button>
        </div>
      </div>
    </div>`;
  }

  async function _saveCompany() {
    const g=id=>document.getElementById(id)?.value||'';
    const btn=document.querySelector('.settings-panel .btn-primary, #settings-panel .btn-primary');
    try {
      await API.saveSettings({
        companyName:g('s-coname'),gstin:g('s-gstin'),cin:g('s-cin'),pan:g('s-pan'),
        address1:g('s-addr1'),address2:g('s-addr2'),email:g('s-email'),website:g('s-web'),
        bankName:g('s-bnk'),bankAcc:g('s-bacc'),bankIFSC:g('s-bifsc'),bankBranch:g('s-bbranch')
      });
      toast('✅ Company profile saved','success');
    } catch(e){toast('Error: '+e.message,'error');}
  }

  function _renderInvoice(panel) {
    const s=_settings;
    panel.innerHTML=`
    <div class="card">
      <div class="card-header"><h2>Invoice Series</h2></div>
      <div class="form-grid">
        <div class="form-group">
          <label>Invoice Prefix</label>
          <input class="form-control" id="s-ipfx" value="${esc(s.invoicePrefix||'ECS')}"/>
          <span class="form-hint">e.g. ECS → ECS/26-27/001</span>
        </div>
        <div class="form-group">
          <label>Current FY</label>
          <input class="form-control" id="s-fy" value="${esc(s.currentFY||getCurrentFY())}"/>
          <span class="form-hint">Format: 26-27</span>
        </div>
        <div class="form-group full" style="margin-top:8px">
          <button class="btn btn-primary np" onclick="Settings._saveInvoice()">💾 Save</button>
        </div>
        <div class="form-section" style="margin-top:16px">Preview</div>
        <div class="form-group full">
          <div style="padding:12px 16px;background:var(--bg);border-radius:var(--radius);font-family:monospace;font-size:14px;font-weight:700;color:var(--navy-600)">
            ${esc(s.invoicePrefix||'ECS')}/${esc(s.currentFY||getCurrentFY())}/001
          </div>
        </div>
      </div>
    </div>`;
  }

  async function _saveInvoice() {
    try {
      await API.saveSettings({
        invoicePrefix: document.getElementById('s-ipfx')?.value||'ECS',
        currentFY:     document.getElementById('s-fy')?.value||getCurrentFY()
      });
      toast('✅ Invoice settings saved','success');
      _settings = await API.getSettings();
      _renderInvoice(document.getElementById('settings-panel'));
    } catch(e){toast('Error: '+e.message,'error');}
  }

  function _renderUsers(panel) {
    panel.innerHTML=`
    <div class="card">
      <div class="card-header">
        <h2>User Management</h2>
        ${SESSION.isAdmin()?`<button class="btn btn-primary btn-sm np" onclick="Settings.openNewUser()">+ Add User</button>`:''}
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>User ID</th><th>Name</th><th>Email</th><th>Role</th><th>Active</th>${SESSION.isAdmin()?'<th class="np">Actions</th>':''}</tr></thead>
        <tbody>
          ${_users.map(u=>`<tr>
            <td style="font-weight:700;font-family:monospace">${esc(u.userId)}</td>
            <td>${esc(u.name)}</td>
            <td style="font-size:11.5px">${esc(u.email||'—')}</td>
            <td>${badge(u.role)}</td>
            <td>${u.active==='true'?`<span class="badge badge-green">Active</span>`:`<span class="badge badge-gray">Inactive</span>`}</td>
            ${SESSION.isAdmin()?`<td class="np" style="white-space:nowrap">
              <button class="btn btn-ghost btn-icon btn-sm" onclick="Settings.openEditUser('${u.id}')">✏️</button>
              ${u.userId!==SESSION.user?.userId?`<button class="btn btn-danger btn-icon btn-sm" onclick="Settings.deleteUser('${u.id}')">🗑</button>`:'<span style="font-size:10px;color:var(--muted)">You</span>'}
            </td>`:''}
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
    <!-- User Modal -->
    <div class="modal-overlay" id="modal-user">
      <div class="modal modal-sm">
        <div class="modal-header"><h3 id="user-modal-title">Add User</h3>
          <button class="modal-close" onclick="closeModal('modal-user')">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full"><label>User ID <span class="req">*</span></label><input class="form-control" id="u-uid" placeholder="Unique login ID"/></div>
            <div class="form-group full"><label>Full Name</label><input class="form-control" id="u-name" placeholder="Display name"/></div>
            <div class="form-group full"><label>Email</label><input class="form-control" id="u-email" type="email"/></div>
            <div class="form-group"><label>Role</label>
              <select class="form-control" id="u-role">
                <option value="Admin">Admin</option>
                <option value="Staff">Staff</option>
                <option value="View">View Only</option>
              </select>
            </div>
            <div class="form-group"><label>Active</label>
              <select class="form-control" id="u-active">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>
            <div class="form-group full"><label>Password</label><input class="form-control" id="u-pw" type="password" placeholder="Leave blank to keep existing"/></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-user')">Cancel</button>
          <button class="btn btn-primary" onclick="Settings.saveUser()">💾 Save</button>
        </div>
      </div>
    </div>`;
  }

  let _editUserId = null;

  function openNewUser() {
    _editUserId=null;
    document.getElementById('user-modal-title').textContent='Add User';
    ['u-uid','u-name','u-email','u-pw'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('u-role').value='Staff';
    document.getElementById('u-active').value='true';
    openModal('modal-user');
  }

  function openEditUser(id) {
    _editUserId=id;
    const u=_users.find(x=>x.id===id);
    if(!u) return;
    document.getElementById('user-modal-title').textContent='Edit User';
    document.getElementById('u-uid').value    = u.userId||'';
    document.getElementById('u-name').value   = u.name||'';
    document.getElementById('u-email').value  = u.email||'';
    document.getElementById('u-role').value   = u.role||'Staff';
    document.getElementById('u-active').value = u.active||'true';
    document.getElementById('u-pw').value     = '';
    openModal('modal-user');
  }

  async function saveUser() {
    const uid=document.getElementById('u-uid').value.trim();
    if(!uid){toast('User ID required','warning');return;}
    const btn=document.querySelector('#modal-user .btn-primary');
    btn.disabled=true;btn.textContent='Saving…';
    try {
      const d={id:_editUserId||null,userId:uid,name:document.getElementById('u-name').value,
        email:document.getElementById('u-email').value,role:document.getElementById('u-role').value,
        active:document.getElementById('u-active').value};
      const pw=document.getElementById('u-pw').value;
      if(pw) d.password=pw;
      await API.saveUser(d);
      toast('✅ User saved','success');
      closeModal('modal-user');
      _users=await API.getUsers();
      _renderUsers(document.getElementById('settings-panel'));
    } catch(e){toast('Error: '+e.message,'error');}
    finally{btn.disabled=false;btn.textContent='💾 Save';}
  }

  async function deleteUser(id) {
    const ok=await confirm('Delete this user?','Delete User');
    if(!ok) return;
    try {
      await API.deleteUser(id);
      toast('🗑 User deleted','success');
      _users=await API.getUsers();
      _renderUsers(document.getElementById('settings-panel'));
    } catch(e){toast('Error: '+e.message,'error');}
  }

  async function _renderActivity(panel) {
    panel.innerHTML=`<div class="card"><div class="card-header"><h2>Activity Log</h2></div>
      <div class="page-loader"><span class="spinner"></span>Loading…</div></div>`;
    try {
      const rows=await API.getActivity();
      panel.innerHTML=`<div class="card"><div class="card-header"><h2>Activity Log</h2>
        <span style="font-size:11px;color:var(--muted)">Last 200 entries</span></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Detail</th></tr></thead>
          <tbody>${rows.map(r=>`<tr>
            <td style="font-size:11px;white-space:nowrap">${fmtDT(r.timestamp)}</td>
            <td style="font-family:monospace;font-size:11.5px">${esc(r.userId||'System')}</td>
            <td><span class="badge badge-blue">${esc(r.action)}</span></td>
            <td style="font-size:11.5px;color:var(--muted)">${esc(r.detail||'—')}</td>
          </tr>`).join('')||'<tr><td colspan="4" class="table-empty">No activity yet</td></tr>'}
          </tbody>
        </table></div>
      </div>`;
    } catch(e){panel.innerHTML=`<div class="card"><p style="color:var(--red)">⚠️ ${e.message}</p></div>`;}
  }

  function _renderBackup(panel) {
    panel.innerHTML=`
    <div class="card">
      <div class="card-header"><h2>Backup & Reset</h2></div>
      <div style="display:flex;flex-direction:column;gap:16px;max-width:480px">
        <div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius)">
          <div style="font-weight:700;margin-bottom:6px">📥 Re-run Setup</div>
          <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">
            Recreates any missing sheets without deleting existing data. Safe to run anytime.
          </div>
          <button class="btn btn-outline np" onclick="Settings.runSetup()">🔄 Run Setup</button>
        </div>
        <div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius)">
          <div style="font-weight:700;margin-bottom:6px">📊 Open Google Sheet</div>
          <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">
            Open the underlying Google Sheet to view or manually manage data.
          </div>
          <button class="btn btn-outline np" onclick="window.open('https://docs.google.com/spreadsheets','_blank')">Open Sheets</button>
        </div>
        <div style="padding:16px;border:1px solid #FECACA;border-radius:var(--radius);background:#FFF5F5">
          <div style="font-weight:700;color:var(--red);margin-bottom:6px">⚠️ About Data</div>
          <div style="font-size:12.5px;color:var(--muted)">
            All data is stored in your Google Sheet. To backup, download the Sheet as Excel from Google Drive. No data is stored in this browser.
          </div>
        </div>
      </div>
    </div>`;
  }

  async function runSetup() {
    try {
      const r=await API.setup();
      toast(`✅ Setup complete — ${r.sheets} sheets verified`,'success');
    } catch(e){toast('Error: '+e.message,'error');}
  }

  function _setSection(s){_section=s;
    document.querySelectorAll('.settings-nav-item').forEach((el,i)=>el.classList.toggle('active',Object.keys({company:1,invoice:1,users:1,activity:1,backup:1})[i]===s));
    _renderSection();}

  return { render, _setSection, _saveCompany, _saveInvoice,
           openNewUser, openEditUser, saveUser, deleteUser, runSetup };
})();

</script>
