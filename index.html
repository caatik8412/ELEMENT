<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Element Environment — Office Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — style.css
   Powered by CA Atik Bhayani Associates
   ============================================================ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --navy-900:#060E1A;--navy-800:#0A1628;--navy-700:#0F2240;
  --navy-600:#1A3A5C;--navy-500:#1E4976;--navy-400:#2563EB;
  --navy-300:#3B82F6;--accent:#38BDF8;--accent-2:#0EA5E9;
  --bg:#F0F4FF;--bg-2:#E8EEF8;--card:#FFFFFF;
  --border:#CBD5E1;--border-2:#E2E8F0;
  --text:#1E293B;--text-2:#334155;--muted:#64748B;--muted-2:#94A3B8;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
  --yellow:#D97706;--yellow-bg:#FEF9C3;
  --orange:#EA580C;--orange-bg:#FFEDD5;
  --purple:#7C3AED;--purple-bg:#EDE9FE;
  --sidebar-w:240px;--sidebar-w-col:64px;--topbar-h:56px;
  --radius:8px;--radius-sm:5px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 20px 48px rgba(0,0,0,.18),0 8px 16px rgba(0,0,0,.10);
  --t:.15s ease;
}

html{font-size:14px;scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy-800) 0%,var(--navy-600) 60%,var(--navy-500) 100%);position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(56,189,248,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(37,99,235,.12) 0%,transparent 50%)}
.login-card{background:var(--card);border-radius:var(--radius-lg);padding:40px 36px 36px;width:380px;box-shadow:var(--shadow-lg);position:relative;z-index:1}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand .leaf{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:linear-gradient(135deg,var(--navy-600),var(--navy-400));border-radius:14px;font-size:24px;margin-bottom:14px;box-shadow:0 4px 12px rgba(26,58,92,.3)}
.login-brand .co-name{font-size:13px;font-weight:800;color:var(--navy-600);text-transform:uppercase;letter-spacing:.04em;line-height:1.35}
.login-brand .co-sub{font-size:11px;color:var(--muted);margin-top:4px}
.login-card h2{font-size:15px;font-weight:700;color:var(--navy-600);margin-bottom:22px;text-align:center}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.login-field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.login-field input{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;color:var(--text);outline:none;transition:border var(--t),box-shadow var(--t);font-family:inherit}
.login-field input:focus{border-color:var(--navy-400);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
#login-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--navy-600),var(--navy-400));color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity var(--t),transform var(--t);letter-spacing:.02em;font-family:inherit}
#login-btn:hover{opacity:.92;transform:translateY(-1px)}
#login-btn:active{transform:translateY(0)}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;display:none;padding:8px 12px;background:var(--red-bg);border-radius:var(--radius-sm)}
.login-powered{font-size:10px;color:var(--muted-2);text-align:center;margin-top:22px}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh}

/* Sidebar */
#sidebar{width:var(--sidebar-w);background:var(--navy-800);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:200;transition:width var(--t);overflow:hidden}
#sidebar.collapsed{width:var(--sidebar-w-col)}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-brand .firm{font-size:9.5px;color:var(--accent);font-weight:700;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;overflow:hidden}
.sb-brand .co{font-size:11.5px;color:#fff;font-weight:800;line-height:1.3;margin-top:4px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden}
.sb-brand .cin{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px;font-family:monospace;white-space:nowrap;overflow:hidden}
#sidebar.collapsed .sb-brand .firm,#sidebar.collapsed .sb-brand .co,#sidebar.collapsed .sb-brand .cin{display:none}
#sidebar nav{flex:1;padding:8px 0;overflow-y:auto;overflow-x:hidden}
.nav-section{padding:14px 16px 4px;font-size:9px;font-weight:800;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;overflow:hidden}
#sidebar.collapsed .nav-section{display:none}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.58);font-size:12.5px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all var(--t);white-space:nowrap;user-select:none;position:relative}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(37,99,235,.22);border-left-color:var(--accent)}
.nav-item .ni{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-item .nl{flex:1}
.nav-item .nbadge{font-size:10px;font-weight:700;background:var(--red);color:#fff;border-radius:99px;padding:1px 6px;min-width:18px;text-align:center}
#sidebar.collapsed .nav-item .nl,#sidebar.collapsed .nav-item .nbadge{display:none}
#sidebar.collapsed .nav-item{justify-content:center;padding:11px}
#sidebar.collapsed .nav-item::after{content:attr(data-label);position:absolute;left:calc(var(--sidebar-w-col) + 8px);background:var(--navy-600);color:#fff;font-size:12px;font-weight:600;padding:5px 10px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity var(--t);z-index:300;box-shadow:var(--shadow-md)}
#sidebar.collapsed .nav-item:hover::after{opacity:1}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:var(--radius-sm);padding:6px 4px;transition:background var(--t)}
.sb-user:hover{background:rgba(255,255,255,.06)}
.sb-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--navy-400),var(--accent-2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.sb-user-info .uname{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.sb-user-info .urole{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}
#sidebar.collapsed .sb-user-info,#sidebar.collapsed .sb-footer-powered{display:none}
.sb-footer-powered{font-size:9.5px;color:rgba(255,255,255,.2);margin-top:8px;white-space:nowrap;overflow:hidden}

/* Topbar */
#topbar{height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:fixed;top:0;left:var(--sidebar-w);right:0;z-index:100;transition:left var(--t);box-shadow:var(--shadow)}
body.sidebar-collapsed #topbar{left:var(--sidebar-w-col)}
.topbar-left{display:flex;align-items:center;gap:14px}
#sidebar-toggle{width:32px;height:32px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:var(--radius-sm);transition:background var(--t);padding:4px}
#sidebar-toggle:hover{background:var(--bg)}
#sidebar-toggle span{display:block;width:18px;height:2px;background:var(--muted);border-radius:2px;transition:transform var(--t),opacity var(--t)}
#page-title{font-size:15px;font-weight:800;color:var(--navy-600)}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-date{font-size:11.5px;color:var(--muted)}
.topbar-fy{font-size:11px;font-weight:700;color:var(--navy-400);background:#DBEAFE;padding:3px 8px;border-radius:99px}

/* Main */
#main{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);min-height:100vh;transition:margin-left var(--t)}
body.sidebar-collapsed #main{margin-left:var(--sidebar-w-col)}
#content{padding:24px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:box-shadow var(--t),transform var(--t)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--navy-400))}
.stat-card .s-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stat-card .s-value{font-size:22px;font-weight:800;color:var(--navy-600);margin-top:6px;line-height:1}
.stat-card .s-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-card .s-icon{position:absolute;top:14px;right:14px;font-size:20px;opacity:.15}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.card-header h2{font-size:14px;font-weight:800;color:var(--navy-600)}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:#F8FAFC;padding:8px 12px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border-2);vertical-align:middle;color:var(--text-2)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#F8FAFF}
tfoot td{padding:10px 12px;background:#F0F4FF;font-weight:700;color:var(--navy-600);border-top:2px solid var(--border)}
.table-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.table-empty .empty-icon{font-size:32px;margin-bottom:8px;display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all var(--t);white-space:nowrap;font-family:inherit;line-height:1.4;letter-spacing:.01em}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--navy-400);color:#fff}.btn-primary:hover:not(:disabled){background:#1D4ED8}
.btn-navy{background:var(--navy-600);color:#fff}.btn-navy:hover:not(:disabled){background:var(--navy-700)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover:not(:disabled){background:#15803D}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover:not(:disabled){background:#B91C1C}
.btn-warning{background:var(--yellow);color:#fff}.btn-warning:hover:not(:disabled){background:#B45309}
.btn-accent{background:var(--accent);color:var(--navy-800)}.btn-accent:hover:not(:disabled){background:var(--accent-2);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover:not(:disabled){background:var(--bg);border-color:var(--muted-2)}
.btn-ghost{background:transparent;color:var(--muted)}.btn-ghost:hover:not(:disabled){background:var(--bg);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:11.5px}
.btn-lg{padding:10px 20px;font-size:14px}
.btn-icon{padding:6px;border-radius:var(--radius-sm)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:700;white-space:nowrap}
.badge-green{background:var(--green-bg);color:#15803D}
.badge-red{background:var(--red-bg);color:#B91C1C}
.badge-yellow{background:var(--yellow-bg);color:#92400E}
.badge-orange{background:var(--orange-bg);color:#9A3412}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-purple{background:var(--purple-bg);color:#5B21B6}
.badge-gray{background:#F1F5F9;color:#475569}
.badge-navy{background:#DBEAFE;color:var(--navy-600)}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group.span2{grid-column:span 2}
.form-group label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-group label .req{color:var(--red);margin-left:2px}
.form-control{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:#fff;font-family:inherit;outline:none;transition:border var(--t),box-shadow var(--t);width:100%}
.form-control:focus{border-color:var(--navy-400);box-shadow:0 0 0 3px rgba(37,99,235,.10)}
.form-control:read-only{background:#F8FAFC;color:var(--muted);cursor:default}
.form-control.error{border-color:var(--red)}
textarea.form-control{resize:vertical;min-height:72px}
.form-section{grid-column:1/-1;font-size:10px;font-weight:800;color:var(--navy-600);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 4px;border-bottom:1.5px solid var(--border);margin-top:4px}
.form-hint{font-size:10.5px;color:var(--muted);margin-top:2px}
.form-error{font-size:10.5px;color:var(--red);margin-top:2px}

/* Pill group */
.pill-group{display:inline-flex;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.pill-btn{padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);border:none;border-right:1.5px solid var(--border);transition:all var(--t);font-family:inherit}
.pill-btn:last-child{border-right:none}
.pill-btn:hover{background:var(--bg);color:var(--text)}
.pill-btn.active{background:var(--navy-600);color:#fff}

/* ── TABS ── */
.tab-strip{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;gap:0;overflow-x:auto}
.tab-btn{padding:8px 18px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all var(--t);background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--navy-400);border-bottom-color:var(--navy-400)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.55);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:820px;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:modalIn .18s ease}
.modal-sm{max-width:460px}
.modal-lg{max-width:1020px}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:14.5px;font-weight:800;color:var(--navy-600)}
.modal-close{width:28px;height:28px;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--muted);line-height:1;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;flex-shrink:0}

/* ── LINE ITEMS ── */
.line-items-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.line-items-table th{background:#EFF6FF;padding:6px 8px;font-size:10.5px;font-weight:700;color:var(--navy-600);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.line-items-table td{padding:4px 6px;border:1px solid var(--border);vertical-align:middle}
.line-items-table td input,.line-items-table td select{width:100%;border:none;background:transparent;font-size:12px;padding:3px 4px;outline:none;font-family:inherit;color:var(--text)}
.line-items-table td input:focus,.line-items-table td select:focus{background:#EFF6FF}
.line-items-table tfoot td{background:#F0F4FF;font-weight:700}
.add-line-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;font-weight:600;color:var(--navy-400);cursor:pointer;padding:4px 10px;border:1.5px dashed var(--navy-300);border-radius:var(--radius-sm);background:transparent;font-family:inherit;transition:all var(--t)}
.add-line-btn:hover{background:#EFF6FF}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy-600);color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;min-width:220px;max-width:360px;animation:toastIn .2s ease;pointer-events:auto}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warning{background:var(--yellow)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── LOADER ── */
.page-loader{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);font-size:13px;gap:10px}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--navy-400);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS POPUP ── */
.status-popup{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:400;min-width:190px;overflow:hidden;animation:modalIn .15s ease}
.status-popup-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;transition:background var(--t);border-bottom:1px solid var(--border-2)}
.status-popup-item:last-child{border-bottom:none}
.status-popup-item:hover{background:var(--bg)}

/* ── DUE DATES ── */
.dd-overdue{color:var(--red);font-weight:700}
.dd-soon{color:var(--yellow);font-weight:600}
.dd-ok{color:var(--green);font-weight:600}
.dd-done{color:var(--muted);text-decoration:line-through}

/* ── AGING ── */
.age-ok{background:var(--green-bg);color:#15803D}
.age-30{background:var(--yellow-bg);color:#92400E}
.age-60{background:var(--orange-bg);color:#9A3412}
.age-90{background:#1E293B;color:#fff}

/* ── GSTR-3B ── */
.gst3b-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:640px){.gst3b-grid{grid-template-columns:1fr}}
.gst3b-box{border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.gst3b-box h3{font-size:11.5px;font-weight:800;color:var(--navy-600);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.gst3b-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border-2)}

const SESSION = {

// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════

const API = {
  _pending: 0,

  async call(action, data = {}) {
    this._pending++;
    try {
      const body = { action, data };
      if (SESSION.token) body.token = SESSION.token;

      const res = await fetch(APP.API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Server error');
      return json.result;

    } finally {
      this._pending--;
    }
  },

  // Auth
  login:    (d) => API.call('login', d),
  ping:     ()  => API.call('ping'),
  setup:    ()  => API.call('setupSheets'),

let _currentRoute = null;

async function navigateTo(route) {
  if (!ROUTES[route]) return;
  const cfg = ROUTES[route];

  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + route);
  if (navEl) navEl.classList.add('active');

  // Update title
  document.getElementById('page-title').textContent = cfg.title;

  // Render
  const content = document.getElementById('content');
  content.innerHTML = `<div class="page-loader"><span class="spinner"></span>Loading ${cfg.title}...</div>`;

  try {
    await cfg.fn();
    _currentRoute = route;
  } catch (e) {
    content.innerHTML = `<div class="card">
      <p style="color:var(--red);font-weight:600">⚠️ Error loading ${cfg.title}: ${e.message}</p>
      <button class="btn btn-outline" style="margin-top:12px" onclick="navigateTo('${route}')">↩ Retry</button>
    </div>`;
    console.error(route, e);
  }
}

// ════════════════════════════════════════════════════════════

async function doLogin() {

  const password = document.getElementById('login-password').value;
  const errEl  = document.getElementById('login-error');
  const btn    = document.getElementById('login-btn');

  errEl.style.display = 'none';
  btn.textContent = 'Signing in…';

    errEl.textContent  = '⚠️ ' + (e.message.includes('Invalid') ? 'Invalid User ID or Password.' : e.message);

  } finally {
    btn.textContent = 'Sign In →';
    btn.disabled    = false;
  }

// ── Sidebar toggle ──────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════

function toast(msg, type = 'info', duration = 3500) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;

  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  el.innerHTML = `<span>${icons[type] || ''}</span><span>${msg}</span>`;
  container.appendChild(el);

  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(12px)';
    el.style.transition = 'all .3s ease';
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ════════════════════════════════════════════════════════════
// MODAL SYSTEM
// ════════════════════════════════════════════════════════════

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Generic confirm dialog
function confirm(msg, title = 'Confirm') {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay open';
    overlay.innerHTML = `
      <div class="confirm-dialog">
        <div class="cd-icon">⚠️</div>
        <h3>${title}</h3>
        <p>${msg}</p>
        <div class="cd-btns">
          <button class="btn btn-outline" id="cd-cancel">Cancel</button>
          <button class="btn btn-danger"  id="cd-ok">Confirm</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cd-cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('#cd-ok').onclick     = () => { overlay.remove(); resolve(true); };
    overlay.onclick = e => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
  });
}

// Status popup (used in GSTR-2A)
function showStatusPopup(anchorEl, options, onSelect) {
  // Remove any existing popup
  document.querySelectorAll('.status-popup').forEach(p => p.remove());

  const popup = document.createElement('div');
  popup.className = 'status-popup';
  popup.style.top  = (anchorEl.offsetTop + anchorEl.offsetHeight + 4) + 'px';
  popup.style.left = anchorEl.offsetLeft + 'px';

  options.forEach(opt => {
    const item = document.createElement('div');
    item.className = 'status-popup-item';
    item.innerHTML = `<span>${opt.icon || ''}</span><span>${opt.label}</span>`;
    item.onclick = () => { popup.remove(); onSelect(opt.value); };
    popup.appendChild(item);
  });

  // Position relative to parent
  anchorEl.parentElement.style.position = 'relative';
  anchorEl.parentElement.appendChild(popup);

  // Click outside to close
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', handler); }
    });
  }, 0);
}

// Format number Indian style
function fmtNum(n, decimals = 2) {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return num.toLocaleString('en-IN', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

// Format currency
function fmtCur(n) {
  const num = parseFloat(n);
  if (isNaN(num)) return '₹0.00';
  return '₹' + fmtNum(num);
}

// Format date
function fmtDate(d) {
  if (!d) return '—';
  try {
    return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch (e) { return d; }
}

// Format datetime
function fmtDT(d) {
  if (!d) return '—';
  try {
    return new Date(d).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return d; }
}

// Today's date as YYYY-MM-DD
function today() {
  return new Date().toISOString().split('T')[0];
}

// Get FY string like "26-27"
function getCurrentFY() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth() + 1;
  return m >= 4
    ? `${String(y).slice(2)}-${String(y + 1).slice(2)}`
    : `${String(y - 1).slice(2)}-${String(y).slice(2)}`;
}

// Days since a date
function daysSince(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  d.setHours(0, 0, 0, 0);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.floor((now - d) / 86400000);
}

// Days until a date
function daysUntil(dateStr) {
  if (!dateStr) return 999;
  const d = new Date(dateStr);
  d.setHours(0, 0, 0, 0);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.ceil((d - now) / 86400000);
}

// Number to Indian words
function numToWords(n) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
    'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];

  function w(n) {
    if (n < 20)       return ones[n];
    if (n < 100)      return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
    if (n < 1000)     return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + w(n%100) : '');
    if (n < 100000)   return w(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + w(n%1000) : '');
    if (n < 10000000) return w(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ' ' + w(n%100000) : '');
    return w(Math.floor(n/10000000)) + ' Crore' + (n%10000000 ? ' ' + w(n%10000000) : '');
  }

  const num = Math.abs(+n || 0);
  const int = Math.floor(num);
  const dec = Math.round((num - int) * 100);
  let result = w(int) + ' Rupees';
  if (dec > 0) result += ' and ' + w(dec) + ' Paise';
  return result + ' Only';
}

function badge(text, color) {

    'Done': 'green', 'Pending': 'yellow', 'NA': 'gray',

    'Intra-State': 'green', 'Inter-State': 'blue',
    // Doc type
    'Invoice': 'navy', 'Proforma': 'blue', 'Quotation': 'purple',
    // Employee
    'Active': 'green', 'Inactive': 'gray', 'Left': 'red',
    // GSTR-2A
    'Matched': 'green', 'Mismatch': 'red', 'Not Available': 'orange',
    'Ineligible ITC': 'purple',
    // Due dates
    'Overdue': 'red', 'Due Soon': 'yellow',
    // Payment
    'Unpaid': 'red',
  };
  const c = color || map[text] || 'gray';
  return `<span class="badge badge-${c}">${text || '—'}</span>`;
}

// Aging badge
function ageBadge(days) {
  if (days <= 0)  return `<span class="badge age-ok">Current</span>`;
  if (days <= 30) return `<span class="badge age-ok">${days}d</span>`;
  if (days <= 60) return `<span class="badge age-30">${days}d</span>`;
  if (days <= 90) return `<span class="badge age-60">${days}d</span>`;
  return `<span class="badge age-90">${days}d — Critical</span>`;
}

// Due date class
function ddClass(days, status) {
  if (status === 'Done' || status === 'Completed') return 'dd-done';
  if (days < 0)  return 'dd-overdue';
  if (days <= 7) return 'dd-soon';
  return 'dd-ok';
}

  if (!s) return '—';
  return s.length > n ? s.slice(0, n) + '…' : s;

      </div>

      <!-- Outstanding Receivables -->
      <div class="card" style="margin-bottom:0">
        <div class="card-header">
          <h2>⚠️ Outstanding Receivables</h2>
          <button class="btn btn-outline btn-sm np" onclick="navigateTo('outstanding')">View All →</button>
        </div>
        ${outRec.length === 0
          ? `<div class="table-empty"><span class="empty-icon">✅</span>No outstanding receivables</div>`
          : `<div class="table-wrap">
              <table>
                <thead><tr><th>Client</th><th>Invoice</th><th>Balance</th><th>Age</th></tr></thead>
                <tbody>
                  ${[...outRec]
                    .sort((a, b) => (parseFloat(b.balance) || 0) - (parseFloat(a.balance) || 0))
                    .slice(0, 6)
                    .map(o => `<tr>
                      <td style="font-weight:600">${trunc(o.clientName, 20)}</td>
                      <td style="font-size:11px">${esc(o.invoiceNo)}</td>
                      <td style="font-weight:700;color:var(--red)">${fmtCur(o.balance)}</td>
                      <td>${ageBadge(parseInt(o.daysOutstanding) || 0)}</td>
                    </tr>`)
                    .join('')
                  }
                </tbody>
                ${outRec.length > 6
                  ? `<tfoot><tr><td colspan="4" style="text-align:right;font-size:11px;color:var(--muted)">+ ${outRec.length - 6} more · Total: ${fmtCur(totalRec)}</td></tr></tfoot>`
                  : `<tfoot><tr><td colspan="3" style="font-weight:700">Total</td><td style="font-weight:700;color:var(--red)">${fmtCur(totalRec)}</td></tr></tfoot>`
                }
              </table>
            </div>`
        }
      </div>
    </div>

    <!-- Recent Bills & Purchases -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">

      <!-- Recent Bills -->
      <div class="card" style="margin-bottom:0">
        <div class="card-header">
          <h2>🧾 Recent Bills</h2>
          <button class="btn btn-outline btn-sm np" onclick="navigateTo('billing')">View All →</button>
        </div>
        ${recentInvs.length === 0
          ? `<div class="table-empty"><span class="empty-icon">🧾</span>No invoices yet<br>
              <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="navigateTo('billing')">Create First Invoice</button></div>`
          : `<div class="table-wrap">
              <table>
                <thead><tr><th>Invoice</th><th>Client</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>
                  ${recentInvs.map(i => `<tr>
                    <td>
                      <div style="font-weight:700;font-size:12px">${esc(i.invoiceNo)}</div>
                      <div style="font-size:10.5px;color:var(--muted)">${fmtDate(i.invoiceDate)}</div>
                    </td>
                    <td>${trunc(i.clientName, 18)}</td>
                    <td style="font-weight:700">${fmtCur(i.totalAmount)}</td>
                    <td>${badge(i.status)}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`
        }
      </div>

      <!-- Recent Purchases -->
      <div class="card" style="margin-bottom:0">
        <div class="card-header">
          <h2>🛒 Recent Purchases</h2>
          <button class="btn btn-outline btn-sm np" onclick="navigateTo('purchase')">View All →</button>
        </div>
        ${recentPurs.length === 0
          ? `<div class="table-empty"><span class="empty-icon">🛒</span>No purchases yet<br>
              <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="navigateTo('purchase')">Add Purchase</button></div>`
          : `<div class="table-wrap">
              <table>
                <thead><tr><th>Vendor</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>
                  ${recentPurs.map(p => `<tr>
                    <td>
                      <div style="font-weight:600">${trunc(p.vendorName, 18)}</div>
                      <div style="font-size:10.5px;color:var(--muted)">${esc(p.expenseCategory || '—')}</div>
                    </td>
                    <td style="font-size:11.5px">${fmtDate(p.purchaseDate)}</td>
                    <td style="font-weight:700">${fmtCur(p.totalAmount)}</td>
                    <td>${badge(p.paymentStatus)}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`
        }
      </div>
    </div>

    <!-- GST Snapshot this month -->
    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <h2>🧮 GST Snapshot — ${monthName} ${thisY}</h2>
        <button class="btn btn-outline btn-sm np" onclick="navigateTo('gstr3b')">Full 3B Estimate →</button>
      </div>
      <div class="gst3b-net-grid">
        <div class="gst3b-net-box">
          <div class="nl">Output CGST</div>
          <div class="nv" style="color:var(--navy-600)">${fmtCur(salesInvs.reduce((s,i)=>s+(parseFloat(i.cgst)||0),0))}</div>
        </div>
        <div class="gst3b-net-box">
          <div class="nl">Output SGST</div>
          <div class="nv" style="color:var(--navy-600)">${fmtCur(salesInvs.reduce((s,i)=>s+(parseFloat(i.sgst)||0),0))}</div>
        </div>
        <div class="gst3b-net-box">
          <div class="nl">Output IGST</div>
          <div class="nv" style="color:var(--navy-600)">${fmtCur(salesInvs.reduce((s,i)=>s+(parseFloat(i.igst)||0),0))}</div>
        </div>
        <div class="gst3b-net-box" style="border-left:2px solid var(--border);padding-left:12px">
          <div class="nl">Less: ITC (Est.)</div>
          <div class="nv" style="color:var(--green)">${fmtCur(purGST)}</div>
        </div>
        <div class="gst3b-net-box" style="border-left:2px solid var(--border);padding-left:12px">
          <div class="nl">Net Payable</div>
          <div class="nv" style="color:${estGST > 0 ? 'var(--red)' : 'var(--green)'};font-size:24px">${fmtCur(estGST)}</div>
        </div>
      </div>
    </div>`;
  }

  return { render };

})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — billing.js
   Modules: Invoice / Proforma / Quotation
   ============================================================ */

'use strict';

const Billing = (() => {

  // ── State ────────────────────────────────────────────────
  let _invoices = [];
  let _clients  = [];
  let _editId   = null;
  let _filter   = { docType: 'all', status: 'all', search: '' };

  // ── Render ───────────────────────────────────────────────
  async function render() {
    [_invoices, _clients] = await Promise.all([API.getInvoices(), API.getClients()]);
    _renderShell();
    _applyFilter();
    _ensureModal();
  }

  function _renderShell() {
    const el = document.getElementById('content');

    // Summary stats across all doc types
    const invOnly  = _invoices.filter(i => (i.docType || 'Invoice') === 'Invoice');
    const totBill  = invOnly.reduce((s, i) => s + (parseFloat(i.totalAmount) || 0), 0);
    const totUnpd  = invOnly.filter(i => i.status === 'Unpaid').reduce((s, i) => s + (parseFloat(i.totalAmount) || 0), 0);
    const totPaid  = invOnly.filter(i => i.status === 'Paid').reduce((s, i) => s + (parseFloat(i.totalAmount) || 0), 0);

    el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--navy-400)">
        <div class="s-icon">🧾</div>
        <div class="s-label">Total Billed</div>
        <div class="s-value">${fmtCur(totBill)}</div>
        <div class="s-sub">${invOnly.length} Tax Invoice${invOnly.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat-card" style="--c:var(--green)">
        <div class="s-icon">✅</div>
        <div class="s-label">Received</div>
        <div class="s-value" style="color:var(--green)">${fmtCur(totPaid)}</div>
        <div class="s-sub">${invOnly.filter(i=>i.status==='Paid').length} paid</div>
      </div>
      <div class="stat-card" style="--c:var(--red)">
        <div class="s-icon">⏳</div>
        <div class="s-label">Outstanding</div>
        <div class="s-value" style="color:var(--red)">${fmtCur(totUnpd)}</div>
        <div class="s-sub">${invOnly.filter(i=>i.status==='Unpaid').length} unpaid</div>
      </div>
      <div class="stat-card" style="--c:var(--purple)">
        <div class="s-icon">📋</div>
        <div class="s-label">Proforma / Quotations</div>
        <div class="s-value">${_invoices.filter(i=>i.docType==='Proforma'||i.docType==='Quotation').length}</div>
        <div class="s-sub">pending conversion</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Billing</h2>
        <div class="card-actions">
          <div class="pill-group">
            <button class="pill-btn active" id="dt-all"       onclick="Billing._setDocFilter('all')">All</button>
            <button class="pill-btn"        id="dt-Invoice"   onclick="Billing._setDocFilter('Invoice')">Invoices</button>
            <button class="pill-btn"        id="dt-Proforma"  onclick="Billing._setDocFilter('Proforma')">Proforma</button>
            <button class="pill-btn"        id="dt-Quotation" onclick="Billing._setDocFilter('Quotation')">Quotations</button>
          </div>
          <select class="form-control" style="width:auto;padding:6px 10px" id="status-filter" onchange="Billing._setStatusFilter(this.value)">
            <option value="all">All Status</option>
            <option value="Unpaid">Unpaid</option>
            <option value="Paid">Paid</option>
            <option value="Partial">Partial</option>
          </select>
          <input class="form-control" style="width:180px;padding:6px 10px" type="text"
            placeholder="Search…" id="bill-search"
            oninput="Billing._setSearch(this.value)"/>
          <button class="btn btn-primary np" onclick="Billing.openNew()">+ New Bill</button>
        </div>
      </div>
      <div id="bill-table-wrap"></div>
    </div>

    <!-- GSTR-1 quick export -->
    <div class="card">
      <div class="card-header">
        <h2>📊 GSTR-1 Quick Export</h2>
        <div class="card-actions">
          <button class="btn btn-accent np" onclick="Billing.exportGSTR1()">⬇️ Download Excel</button>
          <button class="btn btn-outline np" onclick="navigateTo('gstr2a')">GSTR-2A →</button>
        </div>
      </div>
      <div id="gstr1-summary"></div>
    </div>`;

    _renderGSTR1Summary();
  }

  function _applyFilter() {
    let list = [..._invoices];
    if (_filter.docType !== 'all') list = list.filter(i => (i.docType || 'Invoice') === _filter.docType);
    if (_filter.status  !== 'all') list = list.filter(i => i.status === _filter.status);
    if (_filter.search) {
      const q = _filter.search.toLowerCase();
      list = list.filter(i =>
        (i.invoiceNo   || '').toLowerCase().includes(q) ||
        (i.clientName  || '').toLowerCase().includes(q) ||
        (i.clientGSTIN || '').toLowerCase().includes(q)
      );
    }
    list.sort((a, b) => new Date(b.invoiceDate) - new Date(a.invoiceDate));
    _renderTable(list);

    // Sync pill buttons
    ['all','Invoice','Proforma','Quotation'].forEach(t => {
      const el = document.getElementById('dt-' + t);
      if (el) el.classList.toggle('active', _filter.docType === t);
    });
  }

  function _renderTable(list) {
    const wrap = document.getElementById('bill-table-wrap');
    if (!wrap) return;

    if (list.length === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <span class="es-icon">🧾</span>
        <h3>No bills found</h3>
        <p>Create your first invoice, proforma, or quotation.</p>
        <button class="btn btn-primary np" onclick="Billing.openNew()">+ New Bill</button>
      </div>`;
      return;
    }

    wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Doc No.</th>
            <th>Date</th>
            <th>Client</th>
            <th>GSTIN</th>
            <th>Taxable</th>
            <th>GST</th>
            <th>Total</th>
            <th>Supply</th>
            <th>Type</th>
            <th>Status</th>
            <th class="np">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(i => {
            const gst = (parseFloat(i.cgst)||0) + (parseFloat(i.sgst)||0) + (parseFloat(i.igst)||0);
            return `<tr>
              <td style="font-weight:700;font-size:12px;font-family:monospace">${esc(i.invoiceNo)}</td>
              <td style="white-space:nowrap">${fmtDate(i.invoiceDate)}</td>
              <td style="font-weight:600">${trunc(i.clientName, 22)}</td>
              <td style="font-size:11px;font-family:monospace;color:var(--muted)">${i.clientGSTIN || '—'}</td>
              <td>${fmtCur(i.taxableValue)}</td>
              <td>${fmtCur(gst)}</td>
              <td style="font-weight:800">${fmtCur(i.totalAmount)}</td>
              <td>${badge(i.supplyType || '—')}</td>
              <td>${badge(i.docType || 'Invoice')}</td>
              <td>${badge(i.status)}</td>
              <td class="np" style="white-space:nowrap">
                <button class="btn btn-ghost btn-icon btn-sm" title="Print" onclick="Billing.print('${i.id}')">🖨️</button>
                <button class="btn btn-ghost btn-icon btn-sm" title="Edit"  onclick="Billing.openEdit('${i.id}')">✏️</button>
                ${(i.docType === 'Proforma' || i.docType === 'Quotation')
                  ? `<button class="btn btn-accent btn-sm" onclick="Billing.convert('${i.id}')" title="Convert to Invoice">→ Invoice</button>`
                  : `<button class="btn btn-success btn-icon btn-sm" title="Record Payment" onclick="Billing.openPayment('${i.id}')">💰</button>`
                }
                <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="Billing.delete('${i.id}')">🗑</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td colspan="4">Total (${list.length} records)</td>
            <td>${fmtCur(list.reduce((s,i)=>s+(parseFloat(i.taxableValue)||0),0))}</td>
            <td>${fmtCur(list.reduce((s,i)=>s+(parseFloat(i.cgst)||0)+(parseFloat(i.sgst)||0)+(parseFloat(i.igst)||0),0))}</td>
            <td>${fmtCur(list.reduce((s,i)=>s+(parseFloat(i.totalAmount)||0),0))}</td>
            <td colspan="4"></td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  }

  function _renderGSTR1Summary() {
    const wrap = document.getElementById('gstr1-summary');
    if (!wrap) return;
    const invs = _invoices.filter(i => (i.docType || 'Invoice') === 'Invoice');
    const b2b  = invs.filter(i => i.clientGSTIN);
    const b2c  = invs.filter(i => !i.clientGSTIN);
    const rw   = {};
    invs.forEach(i => {
      const r = i.gstRate || '18';
      if (!rw[r]) rw[r] = { taxable: 0, cgst: 0, sgst: 0, igst: 0 };
      rw[r].taxable += parseFloat(i.taxableValue) || 0;
      rw[r].cgst    += parseFloat(i.cgst) || 0;
      rw[r].sgst    += parseFloat(i.sgst) || 0;
      rw[r].igst    += parseFloat(i.igst) || 0;
    });

    wrap.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:14px">
      <div class="pf-box"><div class="pb-label">B2B (with GSTIN)</div><div class="pb-value">${b2b.length}</div></div>
      <div class="pf-box"><div class="pb-label">B2C (no GSTIN)</div><div class="pb-value">${b2c.length}</div></div>
      <div class="pf-box"><div class="pb-label">Inter-State</div><div class="pb-value">${invs.filter(i=>i.supplyType==='Inter-State').length}</div></div>
      <div class="pf-box"><div class="pb-label">Intra-State</div><div class="pb-value">${invs.filter(i=>i.supplyType==='Intra-State').length}</div></div>
      <div class="pf-box"><div class="pb-label">Total Taxable</div><div class="pb-value" style="font-size:13px">${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.taxableValue)||0),0))}</div></div>
      <div class="pf-box"><div class="pb-label">Total GST</div><div class="pb-value" style="font-size:13px">${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.cgst)||0)+(parseFloat(i.sgst)||0)+(parseFloat(i.igst)||0),0))}</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>GST Rate</th><th>Taxable Value</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Total GST</th></tr></thead>
        <tbody>
          ${Object.entries(rw).sort((a,b)=>+a[0]-+b[0]).map(([r,v]) => `<tr>
            <td style="font-weight:700">${r}%</td>
            <td>${fmtCur(v.taxable)}</td>
            <td>${fmtCur(v.cgst)}</td>
            <td>${fmtCur(v.sgst)}</td>
            <td>${fmtCur(v.igst)}</td>
            <td style="font-weight:700">${fmtCur(v.cgst+v.sgst+v.igst)}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td>Total</td>
            <td>${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.taxableValue)||0),0))}</td>
            <td>${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.cgst)||0),0))}</td>
            <td>${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.sgst)||0),0))}</td>
            <td>${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.igst)||0),0))}</td>
            <td>${fmtCur(invs.reduce((s,i)=>s+(parseFloat(i.cgst)||0)+(parseFloat(i.sgst)||0)+(parseFloat(i.igst)||0),0))}</td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  }

  // ── Filter handlers ──────────────────────────────────────
  function _setDocFilter(t)    { _filter.docType = t; _applyFilter(); }
  function _setStatusFilter(s) { _filter.status  = s; _applyFilter(); }
  function _setSearch(q)       { _filter.search  = q; _applyFilter(); }

  // ── Modal ────────────────────────────────────────────────
  function _ensureModal() {
    if (document.getElementById('modal-billing')) return;

    const div = document.createElement('div');
    div.innerHTML = `
    <div class="modal-overlay" id="modal-billing">
      <div class="modal modal-lg">
        <div class="modal-header">
          <h3 id="bill-modal-title">New Invoice</h3>
          <button class="modal-close" onclick="closeModal('modal-billing')">✕</button>
        </div>
        <div class="modal-body">

          <!-- Doc type selector -->
          <div style="margin-bottom:16px">
            <div class="pill-group" id="doctype-pills">
              <button class="pill-btn active" id="pill-Invoice"   onclick="Billing._setDocType('Invoice')">🧾 Tax Invoice</button>
              <button class="pill-btn"        id="pill-Proforma"  onclick="Billing._setDocType('Proforma')">📋 Proforma Invoice</button>
              <button class="pill-btn"        id="pill-Quotation" onclick="Billing._setDocType('Quotation')">💬 Quotation</button>
            </div>
            <input type="hidden" id="b-doctype" value="Invoice"/>
          </div>

          <div class="form-grid">
            <div class="form-section">Document Details</div>
            <div class="form-group">
              <label>Doc Number</label>
              <input class="form-control" id="b-no" readonly placeholder="Auto-generated"/>
            </div>
            <div class="form-group">
              <label>Date <span class="req">*</span></label>
              <input class="form-control" id="b-date" type="date"/>
            </div>
            <div class="form-group">
              <label>Order / PO No.</label>
              <input class="form-control" id="b-ordno" placeholder="Optional"/>
            </div>
            <div class="form-group">
              <label>Order Date</label>
              <input class="form-control" id="b-orddate" type="date"/>
            </div>

            <div class="form-section">Client</div>
            <div class="form-group">
              <label>Select Client <span class="req">*</span></label>
              <select class="form-control" id="b-client" onchange="Billing._onClientChange()">
                <option value="">— Select Client —</option>
              </select>
            </div>
            <div class="form-group">
              <label>Client GSTIN</label>
              <input class="form-control" id="b-gstin" placeholder="Auto-filled" oninput="this.value=this.value.toUpperCase()"/>
            </div>
            <div class="form-group">
              <label>Client State</label>
              <select class="form-control" id="b-cstate" onchange="Billing._calcGST()">
                <option value="">— Select —</option>
              </select>
            </div>
            <div class="form-group">
              <label>Place of Supply</label>
              <select class="form-control" id="b-pos" onchange="Billing._calcGST()">
                <option value="">— Select —</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Client Address (for invoice print)</label>
              <textarea class="form-control" id="b-caddr" rows="2" placeholder="Full billing address"></textarea>
            </div>
          </div>

          <!-- Line Items -->
          <div class="form-section" style="margin:16px 0 8px">Line Items</div>
          <table class="line-items-table" id="line-items-tbl">
            <thead>
              <tr>
                <th style="width:4%">#</th>
                <th style="width:36%">Description</th>
                <th style="width:10%">SAC Code</th>
                <th style="width:9%">Qty</th>
                <th style="width:13%">Rate (₹)</th>
                <th style="width:13%">Amount (₹)</th>
                <th style="width:4%" class="np"></th>
              </tr>
            </thead>
            <tbody id="line-items-body"></tbody>
            <tfoot>
              <tr>
                <td colspan="5" style="text-align:right;font-weight:700">Sub Total</td>
                <td id="li-subtotal" style="font-weight:700">0.00</td>
                <td class="np"></td>
              </tr>
            </tfoot>
          </table>
          <button class="add-line-btn np" onclick="Billing._addRow()">+ Add Row</button>

          <!-- GST Summary -->
          <div class="form-grid" style="margin-top:16px">
            <div class="form-section">GST</div>
            <div class="form-group">
              <label>GST Rate</label>
              <select class="form-control" id="b-grate" onchange="Billing._calcGST()">
                ${gstRateOptions('18')}
              </select>
            </div>
            <div class="form-group">
              <label>Supply Type</label>
              <input class="form-control" id="b-stype" readonly/>
            </div>
            <div class="form-group">
              <label>CGST (₹)</label>
              <input class="form-control" id="b-cgst" readonly/>
            </div>
            <div class="form-group">
              <label>SGST (₹)</label>
              <input class="form-control" id="b-sgst" readonly/>
            </div>
            <div class="form-group">
              <label>IGST (₹)</label>
              <input class="form-control" id="b-igst" readonly/>
            </div>
            <div class="form-group">
              <label>Round Off (₹)</label>
              <input class="form-control" id="b-roff" readonly/>
            </div>
            <div class="form-group">
              <label>Total Amount (₹)</label>
              <input class="form-control" id="b-total" readonly style="font-weight:800;font-size:14px"/>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select class="form-control" id="b-status">
                <option value="Unpaid">Unpaid</option>
                <option value="Paid">Paid</option>
                <option value="Partial">Partial</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Amount in Words</label>
              <input class="form-control" id="b-words" readonly/>
            </div>
            <div class="form-group full">
              <label>Notes / Remarks</label>
              <input class="form-control" id="b-notes" placeholder="Optional internal notes"/>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline"  onclick="closeModal('modal-billing')">Cancel</button>
          <button class="btn btn-warning np" onclick="Billing._printCurrent()">🖨️ Print Preview</button>
          <button class="btn btn-primary"   onclick="Billing.save()">💾 Save</button>
        </div>
      </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal-overlay modal-sm" id="modal-payment">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3>Record Payment</h3>
          <button class="modal-close" onclick="closeModal('modal-payment')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full">
              <label>Invoice</label>
              <input class="form-control" id="pay-invno" readonly/>
            </div>
            <div class="form-group full">
              <label>Outstanding Balance</label>
              <input class="form-control" id="pay-balance" readonly style="font-weight:700;color:var(--red)"/>
            </div>
            <div class="form-group full">
              <label>Payment Amount (₹) <span class="req">*</span></label>
              <input class="form-control" id="pay-amount" type="number" step="0.01" min="0" placeholder="0.00"/>
            </div>
            <div class="form-group full">
              <label>Payment Date</label>
              <input class="form-control" id="pay-date" type="date"/>
            </div>
            <div class="form-group full">
              <label>Remarks</label>
              <input class="form-control" id="pay-remarks" placeholder="NEFT / Cheque no. etc."/>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-payment')">Cancel</button>
          <button class="btn btn-success" onclick="Billing.savePayment()">💰 Record Payment</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div);

    // Populate state dropdowns
    populateStateSelect('b-cstate');
    populateStateSelect('b-pos');
  }

  // ── Doc type ─────────────────────────────────────────────
  function _setDocType(t) {
    document.getElementById('b-doctype').value = t;
    ['Invoice','Proforma','Quotation'].forEach(x => {
      document.getElementById('pill-' + x)?.classList.toggle('active', x === t);
    });
    // Quotation/Proforma don't need status
    const statusGrp = document.getElementById('b-status')?.closest('.form-group');
    if (statusGrp) statusGrp.style.display = t === 'Invoice' ? '' : 'none';
  }

  // ── Client auto-fill ─────────────────────────────────────
  function _onClientChange() {
    const id = document.getElementById('b-client').value;
    const cl = _clients.find(c => c.id === id);
    if (!cl) return;
    document.getElementById('b-gstin').value = cl.gstin || '';
    document.getElementById('b-caddr').value =
      [cl.address, cl.city, cl.state].filter(Boolean).join(', ');

    // Set state dropdowns
    const cstate = document.getElementById('b-cstate');
    const pos    = document.getElementById('b-pos');
    [...cstate.options].forEach(o => { if (o.value === cl.state) cstate.value = cl.state; });
    [...pos.options].forEach(o    => { if (o.value === cl.state) pos.value    = cl.state; });
    _calcGST();
  }

  // ── Line items ───────────────────────────────────────────
  function _addRow(desc = '', sac = '', qty = 1, rate = 0) {
    const tbody = document.getElementById('line-items-body');
    const idx   = tbody.children.length + 1;
    const tr    = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center;color:var(--muted);font-size:11px">${String.fromCharCode(64 + idx)}</td>
      <td><input placeholder="Description of service" value="${esc(desc)}" oninput="Billing._calcGST()"/></td>
      <td><input placeholder="SAC" value="${esc(sac)}" style="font-family:monospace;font-size:11.5px"/></td>
      <td><input type="number" min="0" step="0.01" value="${qty}" oninput="Billing._calcGST()"/></td>
      <td><input type="number" min="0" step="0.01" value="${rate}" oninput="Billing._calcGST()"/></td>
      <td class="row-amt" style="font-weight:700;text-align:right">${fmtNum((+qty)*(+rate))}</td>
      <td class="np" style="text-align:center">
        <button onclick="this.closest('tr').remove();Billing._calcGST()"
          style="background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;padding:2px 4px">✕</button>
      </td>`;
    tbody.appendChild(tr);
    _calcGST();
  }

  function _getItems() {
    const rows = document.getElementById('line-items-body')?.querySelectorAll('tr') || [];
    return [...rows].map((tr, i) => {
      const inputs = tr.querySelectorAll('input');
      const qty    = parseFloat(inputs[2].value) || 0;
      const rate   = parseFloat(inputs[3].value) || 0;
      const amt    = qty * rate;
      // Update row amount display
      const amtEl  = tr.querySelector('.row-amt');
      if (amtEl) amtEl.textContent = fmtNum(amt);
      return {
        description: inputs[0].value,
        sacCode:     inputs[1].value,
        qty,
        rate,
        amount:      amt
      };
    });
  }

  // ── GST Calculation ──────────────────────────────────────
  function _calcGST() {
    const items   = _getItems();
    const subTotal = items.reduce((s, i) => s + i.amount, 0);
    const rate     = parseFloat(document.getElementById('b-grate')?.value) || 0;
    const pos      = document.getElementById('b-pos')?.value || '';
    const isInter  = pos && pos !== APP.COMPANY.state;
    const gst      = subTotal * rate / 100;
    const raw      = subTotal + gst;
    const rnd      = Math.round(raw) - raw;
    const total    = Math.round(raw);

    const set = (id, v) => {
      const el = document.getElementById(id);
      if (el) el.value = typeof v === 'number' ? v.toFixed(2) : v;
    };

    const sub = document.getElementById('li-subtotal');
    if (sub) sub.textContent = fmtNum(subTotal);

    set('b-stype', isInter ? 'Inter-State' : 'Intra-State');
    set('b-cgst',  isInter ? 0 : gst / 2);
    set('b-sgst',  isInter ? 0 : gst / 2);
    set('b-igst',  isInter ? gst : 0);
    set('b-roff',  rnd);
    set('b-total', total);
    if (document.getElementById('b-words')) {
      document.getElementById('b-words').value = total > 0 ? numToWords(total) : '';
    }
  }

  // ── Open new / edit ──────────────────────────────────────
  async function openNew() {
    _editId = null;
    _resetModal();
    document.getElementById('bill-modal-title').textContent = 'New Invoice';

    // Populate clients
    _populateClientDropdown();

    // Get next invoice number
    try {
      const r = await API.getNextInvNo('Invoice');
      document.getElementById('b-no').value = r.invoiceNo;
    } catch (e) { document.getElementById('b-no').value = ''; }

    document.getElementById('b-date').value = today();
    _addRow(); // start with one row
    openModal('modal-billing');
  }

  function openEdit(id) {
    _editId = id;
    const inv = _invoices.find(i => i.id === id);
    if (!inv) return;

    _resetModal();
    document.getElementById('bill-modal-title').textContent = 'Edit — ' + inv.invoiceNo;
    _populateClientDropdown(inv.clientId);

    _setDocType(inv.docType || 'Invoice');
    document.getElementById('b-no').value      = inv.invoiceNo || '';
    document.getElementById('b-date').value    = inv.invoiceDate || '';
    document.getElementById('b-ordno').value   = inv.orderNo || '';
    document.getElementById('b-orddate').value = inv.orderDate || '';
    document.getElementById('b-gstin').value   = inv.clientGSTIN || '';
    document.getElementById('b-caddr').value   = inv.clientAddress || '';
    document.getElementById('b-grate').value   = inv.gstRate || '18';
    document.getElementById('b-status').value  = inv.status || 'Unpaid';
    document.getElementById('b-notes').value   = inv.notes || '';

    // State dropdowns
    const cstate = document.getElementById('b-cstate');
    const pos    = document.getElementById('b-pos');
    [...cstate.options].forEach(o => { if (o.value === inv.clientState)    cstate.value = inv.clientState; });
    [...pos.options].forEach(o    => { if (o.value === inv.placeOfSupply)  pos.value    = inv.placeOfSupply; });

    // Line items
    const items = Array.isArray(inv.items) ? inv.items : [];
    items.forEach(it => _addRow(it.description || it.desc || '', it.sacCode || it.sac || '', it.qty || 1, it.rate || 0));
    if (items.length === 0) _addRow();

    _calcGST();
    openModal('modal-billing');
  }

  function _resetModal() {
    ['b-no','b-date','b-ordno','b-orddate','b-gstin','b-caddr','b-stype',
     'b-cgst','b-sgst','b-igst','b-roff','b-total','b-words','b-notes'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('b-grate').value  = '18';
    document.getElementById('b-status').value = 'Unpaid';
    document.getElementById('b-client').value = '';
    document.getElementById('line-items-body').innerHTML = '';
    const sub = document.getElementById('li-subtotal');
    if (sub) sub.textContent = '0.00';
    _setDocType('Invoice');
  }

  function _populateClientDropdown(selectedId = null) {
    const sel = document.getElementById('b-client');
    if (!sel) return;
    sel.innerHTML = `<option value="">— Select Client —</option>` +
      _clients.map(c => `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${esc(c.name)}</option>`).join('');
    if (selectedId) _onClientChange();
  }

  // ── Convert Proforma / Quotation → Invoice ───────────────
  async function convert(id) {
    const ok = await confirm('Convert this document to a Tax Invoice?', 'Convert to Invoice');
    if (!ok) return;
    const inv = _invoices.find(i => i.id === id);
    if (!inv) return;

    try {
      const r = await API.getNextInvNo('Invoice');
      await API.saveInvoice({
        ...inv,
        id:        inv.id,      // update same record
        docType:   'Invoice',
        invoiceNo: r.invoiceNo,
        status:    'Unpaid'
      });
      toast('✅ Converted to Invoice ' + r.invoiceNo, 'success');
      render();
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  }

  // ── Save ─────────────────────────────────────────────────
  async function save() {
    const items = _getItems();
    if (!items.length || !items[0].description) { toast('Add at least one line item', 'warning'); return; }

    const clientSel = document.getElementById('b-client');
    const docType   = document.getElementById('b-doctype').value;

    const invDate   = document.getElementById('b-date').value;
    if (!invDate) { toast('Invoice date is required', 'warning'); return; }

    const clientId   = clientSel.value;
    const clientName = clientSel.options[clientSel.selectedIndex]?.text || '';
    if (!clientId) { toast('Please select a client', 'warning'); return; }

    const btn = document.querySelector('#modal-billing .btn-primary');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    try {
      const result = await API.saveInvoice({
        id:            _editId || null,
        docType,
        invoiceNo:     document.getElementById('b-no').value,
        invoiceDate:   invDate,
        orderNo:       document.getElementById('b-ordno').value,
        orderDate:     document.getElementById('b-orddate').value,
        clientId,
        clientName,
        clientGSTIN:   document.getElementById('b-gstin').value,
        clientAddress: document.getElementById('b-caddr').value,
        clientState:   document.getElementById('b-cstate').value,
        clientStateCode: stateCode(document.getElementById('b-cstate').value),
        placeOfSupply: document.getElementById('b-pos').value,
        gstRate:       document.getElementById('b-grate').value,
        notes:         document.getElementById('b-notes').value,
        status:        docType === 'Invoice' ? document.getElementById('b-status').value : 'NA',
        items
      });

      toast(`✅ ${docType} ${result.invoiceNo || ''} saved`, 'success');
      closeModal('modal-billing');
      render();
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = '💾 Save';
    }
  }

  // ── Print ─────────────────────────────────────────────────
  function print(id) {
    const inv = _invoices.find(i => i.id === id);
    if (inv) printInvoice(inv);
  }

  function _printCurrent() {
    const items = _getItems();
    const clientSel = document.getElementById('b-client');
    printInvoice({
      docType:       document.getElementById('b-doctype').value,
      invoiceNo:     document.getElementById('b-no').value,
      invoiceDate:   document.getElementById('b-date').value,
      orderNo:       document.getElementById('b-ordno').value,
      orderDate:     document.getElementById('b-orddate').value,
      clientName:    clientSel.options[clientSel.selectedIndex]?.text || '',
      clientGSTIN:   document.getElementById('b-gstin').value,
      clientAddress: document.getElementById('b-caddr').value,
      supplyType:    document.getElementById('b-stype').value,
      gstRate:       document.getElementById('b-grate').value,
      taxableValue:  items.reduce((s, i) => s + i.amount, 0),
      cgst:          document.getElementById('b-cgst').value,
      sgst:          document.getElementById('b-sgst').value,
      igst:          document.getElementById('b-igst').value,
      roundOff:      document.getElementById('b-roff').value,
      totalAmount:   document.getElementById('b-total').value,
      amountWords:   document.getElementById('b-words').value,
      notes:         document.getElementById('b-notes').value,
      items
    });
  }

  // ── Payment ──────────────────────────────────────────────
  let _payInvoiceId = null;

  function openPayment(id) {
    _payInvoiceId = id;
    const inv = _invoices.find(i => i.id === id);
    if (!inv) return;

    // Find outstanding record for this invoice
    document.getElementById('pay-invno').value   = inv.invoiceNo;
    document.getElementById('pay-balance').value = '—';
    document.getElementById('pay-amount').value  = '';
    document.getElementById('pay-date').value    = today();
    document.getElementById('pay-remarks').value = '';

    // Fetch outstanding to get balance
    API.getOutstanding().then(rows => {
      const rec = rows.find(r => r.invoiceId === id);
      if (rec) document.getElementById('pay-balance').value = fmtCur(rec.balance);
    });

    openModal('modal-payment');
  }

  async function savePayment() {
    const amount = parseFloat(document.getElementById('pay-amount').value);
    if (!amount || amount <= 0) { toast('Enter a valid payment amount', 'warning'); return; }

    const btn = document.querySelector('#modal-payment .btn-success');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    try {
      await API.recordPayment({ invoiceId: _payInvoiceId, amount });
      toast('✅ Payment recorded', 'success');
      closeModal('modal-payment');
      render();
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = '💰 Record Payment';
    }
  }

  // ── Delete ───────────────────────────────────────────────
  async function del(id) {
    const inv = _invoices.find(i => i.id === id);
    const ok  = await confirm(`Delete ${inv?.invoiceNo || 'this bill'}? This cannot be undone.`, 'Delete Bill');
    if (!ok) return;
    try {
      await API.deleteInvoice(id);
      toast('🗑 Bill deleted', 'success');
      render();
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  }

  // ── GSTR-1 Excel Export ───────────────────────────────────
  function exportGSTR1() {
    const invs = _invoices.filter(i => (i.docType || 'Invoice') === 'Invoice');
    if (!invs.length) { toast('No Tax Invoices to export', 'warning'); return; }

    const XLSX = window.XLSX;
    if (!XLSX) { toast('Excel library not loaded', 'error'); return; }

    const wb = XLSX.utils.book_new();

    // B2B sheet
    const b2bRows = [['Invoice No','Invoice Date','Receiver Name','Receiver GSTIN','Place of Supply','Invoice Value','Taxable Value','GST Rate','IGST','CGST','SGST']];
    invs.filter(i => i.clientGSTIN).forEach(i =>
      b2bRows.push([i.invoiceNo, i.invoiceDate, i.clientName, i.clientGSTIN,
        i.placeOfSupply || i.clientState, i.totalAmount, i.taxableValue,
        (i.gstRate || '') + '%', i.igst || 0, i.cgst || 0, i.sgst || 0])
    );
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(b2bRows), 'B2B');

    // B2C sheet
    const b2cRows = [['Invoice No','Invoice Date','Client Name','Invoice Value','Taxable Value','GST Rate','CGST','SGST','IGST']];
    invs.filter(i => !i.clientGSTIN).forEach(i =>
      b2cRows.push([i.invoiceNo, i.invoiceDate, i.clientName, i.totalAmount,
        i.taxableValue, (i.gstRate||'') + '%', i.cgst||0, i.sgst||0, i.igst||0])
    );
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(b2cRows), 'B2C');

    // Rate-wise summary
    const rw = {};
    invs.forEach(i => {
      const r = i.gstRate || '18';
      if (!rw[r]) rw[r] = { taxable:0, cgst:0, sgst:0, igst:0 };
      rw[r].taxable += parseFloat(i.taxableValue)||0;
      rw[r].cgst    += parseFloat(i.cgst)||0;
      rw[r].sgst    += parseFloat(i.sgst)||0;
      rw[r].igst    += parseFloat(i.igst)||0;
    });
    const rwRows = [['GST Rate','Taxable Value','CGST','SGST','IGST','Total GST']];
    Object.entries(rw).sort((a,b)=>+a[0]-+b[0]).forEach(([r,v]) =>
      rwRows.push([r+'%', v.taxable, v.cgst, v.sgst, v.igst, v.cgst+v.sgst+v.igst])
    );
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rwRows), 'Rate Summary');

    XLSX.writeFile(wb, `GSTR1_TheElementEnvironment_${getCurrentFY()}.xlsx`);
    toast('✅ GSTR-1 Excel downloaded', 'success');
  }

  // ── Public API ───────────────────────────────────────────
  return {
    render,
    openNew,
    openEdit,
    convert,
    save,
    print,
    delete:      del,
    openPayment,
    savePayment,
    exportGSTR1,
    // filter handlers (called from inline onclick)
    _setDocFilter,
    _setStatusFilter,
    _setSearch,
    _setDocType,
    _onClientChange,
    _addRow,
    _calcGST,
    _printCurrent
  };

})();

</script>
<script>
/* ============================================================
   THE ELEMENT ENVIRONMENT PRIVATE LIMITED
   Office Manager V1 — purchase.js
   ============================================================ */

'use strict';

const Purchase = (() => {

  // ── State ────────────────────────────────────────────────
  let _purchases = [];
  let _editId    = null;
  let _filter    = { category: 'all', status: 'all', search: '' };

  // ── Render ───────────────────────────────────────────────
  async function render() {
    _purchases = await API.getPurchases();
    _renderShell();
    _applyFilter();
    _ensureModal();
  }

  function _renderShell() {
    const el = document.getElementById('content');

    const total    = _purchases.reduce((s,p) => s + (parseFloat(p.totalAmount)||0), 0);
    const totGST   = _purchases.reduce((s,p) => s + (parseFloat(p.cgst)||0) + (parseFloat(p.sgst)||0) + (parseFloat(p.igst)||0), 0);
    const unpaid   = _purchases.filter(p => p.paymentStatus === 'Unpaid').reduce((s,p) => s + (parseFloat(p.totalAmount)||0), 0);
    const withGST  = _purchases.filter(p => parseFloat(p.gstRate) > 0).length;

    // Category breakdown
    const cats = {};
    _purchases.forEach(p => {
      const c = p.expenseCategory || 'Other';
      cats[c] = (cats[c] || 0) + (parseFloat(p.totalAmount) || 0);
    });
    const topCat = Object.entries(cats).sort((a,b) => b[1]-a[1]).slice(0,1)[0];

    el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--orange)">
        <div class="s-icon">🛒</div>
        <div class="s-label">Total Purchases</div>
        <div class="s-value">${fmtCur(total)}</div>
        <div class="s-sub">${_purchases.length} entr${_purchases.length!==1?'ies':'y'}</div>
      </div>
      <div class="stat-card" style="--c:var(--navy-400)">
        <div class="s-icon">🧾</div>
        <div class="s-label">Total ITC (GST Paid)</div>
        <div class="s-value">${fmtCur(totGST)}</div>
        <div class="s-sub">${withGST} GST invoice${withGST!==1?'s':''} → GSTR-2A</div>
      </div>
      <div class="stat-card" style="--c:var(--red)">
        <div class="s-icon">⏳</div>
        <div class="s-label">Payables Outstanding</div>
        <div class="s-value" style="color:var(--red)">${fmtCur(unpaid)}</div>
        <div class="s-sub">${_purchases.filter(p=>p.paymentStatus==='Unpaid').length} unpaid</div>
      </div>
      <div class="stat-card" style="--c:var(--purple)">
        <div class="s-icon">📂</div>
        <div class="s-label">Top Expense Head</div>
        <div class="s-value" style="font-size:14px">${topCat ? topCat[0] : '—'}</div>
        <div class="s-sub">${topCat ? fmtCur(topCat[1]) : ''}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Purchases & Expenses</h2>
        <div class="card-actions">
          <select class="form-control" style="width:auto;padding:6px 10px" id="pur-cat-filter"
            onchange="Purchase._setCatFilter(this.value)">
            <option value="all">All Categories</option>
            ${EXPENSE_CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}
          </select>
          <select class="form-control" style="width:auto;padding:6px 10px" id="pur-status-filter"
            onchange="Purchase._setStatusFilter(this.value)">
            <option value="all">All Status</option>
            <option value="Paid">Paid</option>
            <option value="Unpaid">Unpaid</option>
          </select>
          <input class="form-control" style="width:180px;padding:6px 10px" type="text"
            placeholder="Search…" id="pur-search"
            oninput="Purchase._setSearch(this.value)"/>
          <button class="btn btn-outline np" onclick="Purchase.exportExcelData()">⬇️ Export</button>
          <button class="btn btn-primary np" onclick="Purchase.openNew()">+ Add Purchase</button>
        </div>
      </div>
      <div id="pur-table-wrap"></div>
    </div>

    <!-- Category breakdown -->
    <div class="card">
      <div class="card-header"><h2>📂 Expense Category Breakdown</h2></div>
      <div id="cat-breakdown"></div>
    </div>`;

    _renderCategoryBreakdown();
  }

  function _applyFilter() {
    let list = [..._purchases];
    if (_filter.category !== 'all') list = list.filter(p => p.expenseCategory === _filter.category);
    if (_filter.status   !== 'all') list = list.filter(p => p.paymentStatus   === _filter.status);
    if (_filter.search) {
      const q = _filter.search.toLowerCase();
      list = list.filter(p =>
        (p.vendorName      || '').toLowerCase().includes(q) ||
        (p.vendorInvoiceNo || '').toLowerCase().includes(q) ||
        (p.vendorGSTIN     || '').toLowerCase().includes(q) ||
        (p.description     || '').toLowerCase().includes(q)
      );
    }
    list.sort((a,b) => new Date(b.purchaseDate) - new Date(a.purchaseDate));
    _renderTable(list);
  }

  function _renderTable(list) {
    const wrap = document.getElementById('pur-table-wrap');
    if (!wrap) return;

    if (list.length === 0) {
      wrap.innerHTML = `<div class="empty-state">
        <span class="es-icon">🛒</span>
        <h3>No purchases found</h3>
        <p>Add your first purchase or expense entry.</p>
        <button class="btn btn-primary np" onclick="Purchase.openNew()">+ Add Purchase</button>
      </div>`;
      return;
    }

    wrap.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Vendor</th>
            <th>GSTIN</th>
            <th>Inv No.</th>
            <th>Category</th>
            <th>Taxable</th>
            <th>GST</th>
            <th>Total</th>
            <th>2A Status</th>
            <th>Pmt</th>
            <th class="np">Actions</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(p => {
            const gst = (parseFloat(p.cgst)||0) + (parseFloat(p.sgst)||0) + (parseFloat(p.igst)||0);
            const has2a = parseFloat(p.gstRate) > 0 && p.vendorGSTIN;
            return `<tr>
              <td style="white-space:nowrap">${fmtDate(p.purchaseDate)}</td>
              <td style="font-weight:600">${trunc(p.vendorName, 22)}</td>
              <td style="font-size:11px;font-family:monospace;color:var(--muted)">${p.vendorGSTIN || '—'}</td>
              <td style="font-size:11.5px">${esc(p.vendorInvoiceNo || '—')}</td>
              <td><span class="badge badge-gray">${esc(p.expenseCategory || '—')}</span></td>
              <td>${fmtCur(p.taxableValue)}</td>
              <td>${gst > 0 ? fmtCur(gst) : '<span style="color:var(--muted)">—</span>'}</td>
              <td style="font-weight:700">${fmtCur(p.totalAmount)}</td>
              <td>${has2a ? _gstr2aBadge(p.gstr2aStatus) : '<span style="color:var(--muted);font-size:11px">N/A</span>'}</td>
              <td>${badge(p.paymentStatus || 'Unpaid')}</td>
              <td class="np" style="white-space:nowrap">
                <button class="btn btn-ghost btn-icon btn-sm" title="Edit"   onclick="Purchase.openEdit('${p.id}')">✏️</button>
