<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Element Environment — Office Manager</title>
  <link rel="stylesheet" href="css/style.css"/>

</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="leaf">🌿</div>
      <div class="co-name">The Element Environment<br>Private Limited</div>
      <div class="co-sub">Office Management System V1</div>
    </div>
    <h2>Sign In to Continue</h2>
    <div class="login-field">
      <label>User ID</label>
      <input id="login-userid" type="text" placeholder="Enter User ID" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="Enter Password"/>
    </div>
    <button id="login-btn">Sign In →</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-powered">Powered by CA Atik Bhayani Associates | FRN: 159465W | M.No. 609911</div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-brand">
      <div class="firm">CA Atik Bhayani</div>
      <div class="co">The Element<br>Environment Pvt Ltd</div>
      <div class="cin">CIN: U74909PN2026PTC253784</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sb-footer">
      <div class="sb-user" onclick="navigateTo('settings')">
        <div class="sb-avatar" id="sb-avatar">A</div>
        <div class="sb-user-info">
          <div class="uname" id="sb-uname">User</div>
          <div class="urole" id="sb-urole">Role</div>
        </div>
      </div>
      <div class="sb-footer-powered">Powered by CA Atik Bhayani</div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle">
          <span></span><span></span><span></span>
        </button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
        <span class="topbar-fy"   id="topbar-fy"></span>
        <button class="btn btn-ghost btn-sm" id="logout-btn" style="color:var(--muted)">↩ Logout</button>
      </div>
    </div>
    <div id="content"></div>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

</body>
</html>
